# ===========================================================================
# DNSSEC — 域名系统安全扩展
# ===========================================================================
# 概述:
#   DNSSEC 通过数字签名链保护 DNS 数据的完整性和真实性。递归解析器的
#   DNSSEC 验证比权威服务器更重要 —— 它保护的是"最后一公里"。
#
# 核心关注点:
#   - validation: 验证模式 —— 企业生产推荐 validate
#   - trustanchors: 信任锚点 —— 内部签名域需手动配置 DS 记录
#   - negative_trustanchors: NTA —— 临时绕过故障域的验证
#
# 部署路径:
#   off → process (观察) → log-fail (评估) → validate (正式启用)
# ===========================================================================

dnssec:

  # --------------------------------------------------------------------------
  # validation — DNSSEC 验证模式
  # --------------------------------------------------------------------------
  # 默认: process
  #   off                  — 不处理 DNSSEC，忽略 EDNS DO 标记
  #   process-no-validate  — 传递 DNSSEC 记录但不验证
  #   process              — 为请求 DNSSEC 的客户端做验证，但不强制
  #   log-fail             — 验证并记录 Bogus 但不拒绝
  #   validate             — 完整验证，Bogus 返回 SERVFAIL ★企业推荐
  #
  # 企业生产推荐 validate，确保客户端始终获得验证过的数据。
  #
  # 各模式对客户端响应的影响:
  #   ┌─────────────────────┬────────┬────────┬──────────┐
  #   │ 模式                 │ AD标志  │ Bogus处理│ DNSSEC数据集│
  #   ├─────────────────────┼────────┼────────┼──────────┤
  #   │ off                  │ 不设置  │ 忽略   │ 不传递    │
  #   │ process-no-validate  │ 不设置  │ 忽略   │ 传递      │
  #   │ process              │ 按需设置│ 忽略   │ 传递      │
  #   │ log-fail             │ 按需设置│ 记录   │ 传递      │
  #   │ validate             │ 按需设置│ SERVFAIL│ 传递     │
  #   └─────────────────────┴────────┴────────┴──────────┘
  #
  # 场景推荐:
  #   - validate: 面向用户的生产递归（浏览器、终端用户）
  #   - process:  内部系统兼容过渡期（配合 NTA 管理）
  #   - off:      纯内网 DNS（无公网 DNSSEC 需求）
  #
  validation: validate

  # --------------------------------------------------------------------------
  # trustanchors — 信任锚点 (Trust Anchors)
  # --------------------------------------------------------------------------
  # 默认: 内置根区 KSK (20326 和 38696)
  #
  # 这是 DNSSEC 验证链的根。Recursor 默认包含 IANA 根区信任锚点。
  # 如果添加了某 zone 的信任锚点，根区锚点仍保留（除非覆盖根区条目）。
  # 多个条目的 dsrecords 会合并。
  #
  # 对于内部有 DNSSEC 签名但未在公网委托的 zone，需要把其 DS 记录添加到此。
  #
  # 背景:
  #   DNSSEC 通过数字签名链保证 DNS 数据未被篡改。验证从"信任锚点"开始，
  #   沿着 DNS 层级逐级验证: 根 → TLD → 二级域 → ...
  #   Trust Anchor 就是这个验证链的起点 — 它是你无条件信任的公钥。
  #
  # 验证链模型 (以 www.example.com 为例):
  #
  #   信任锚点: 根区 KSK (配置在此)
  #     │ 验证根区的 DNSKEY → 验证根区签名的 DS 记录
  #     ▼
  #   .com 的 DS 记录 (由根区签名)
  #     │ 验证 .com 的 DNSKEY → 验证 .com 签名的 DS 记录
  #     ▼
  #   example.com 的 DS 记录 (由 .com 签名)
  #     │ 验证 example.com 的 DNSKEY → 验证 A 记录的 RRSIG
  #     ▼
  #   www.example.com 的 A 记录 ✓ 验证通过
  #
  #   ┌─────────┐     DS(子)      ┌──────────┐     DS(子)      ┌──────────────┐
  #   │ 根区 (.) │ ──────────────→ │ .com TLD │ ──────────────→│ example.com  │
  #   │ KSK 锚点 │  由根 DNSKEY   │ DNSKEY   │ 由.com DNSKEY    │ DNSKEY/A记录 │
  #   └─────────┘   签名验证       └──────────┘  签名验证        └──────────────┘
  #
  # DS 记录格式 (每行):
  #   KeyTag Algorithm DigestType DigestHexString
  #   │       │         │          └── 哈希值 (十六进制)
  #   │       │         └── 摘要算法: 1=SHA-1, 2=SHA-256, 4=SHA-384
  #   │       └── 算法: 5=RSASHA1, 8=RSASHA256, 13=ECDSAP256SHA256, 15=Ed25519
  #   └── 密钥标签 (用于标识使用哪个 DNSKEY)
  #
  # 何时需要添加 Trust Anchor:
  #   1) 内部域有 DNSSEC 签名但未在公网父域注册 DS 记录
  #      (例如 internal.example.com 的 DS 记录未提交到 .com 注册局)
  #   2) 使用私有 DNS 根 (完全自建 DNS 层级)
  #   3) 测试环境模拟 DNSSEC 验证链
  #
  # =========================================================================
  # 为内网域添加 Trust Anchor 的详细步骤
  # =========================================================================
  #
  # 场景: 公司内部域 corp.internal 已配置 DNSSEC 签名，但未(也无法)在公网
  #       注册 DS 记录。需要让 Recursor 手动信任这个域。
  #
  # ┌─────────────────────────────────────────────────────────────────────┐
  # │ 步骤 1: 在权威 DNS 服务器上对 zone 进行 DNSSEC 签名                  │
  # └─────────────────────────────────────────────────────────────────────┘
  #
  #   以 PowerDNS Authoritative 为例:
  #     pdnsutil secure-zone corp.internal
  #     pdnsutil rectify-zone corp.internal
  #
  #   以 BIND 为例:
  #     dnssec-keygen -a ECDSAP256SHA256 -n ZONE corp.internal
  #     dnssec-keygen -f KSK -a ECDSAP256SHA256 -n ZONE corp.internal
  #     # 将生成的 Key 文件 include 进 zone 配置
  #     dnssec-signzone -o corp.internal -k Kcorp.internal.+013+xxxxx corp.internal.db
  #
  # ┌─────────────────────────────────────────────────────────────────────┐
  # │ 步骤 2: 从权威 DNS 服务器获取 DNSKEY 记录                            │
  # └─────────────────────────────────────────────────────────────────────┘
  #
  #     dig DNSKEY corp.internal @权威DNS服务器IP
  #
  #   输出示例:
  #     ;; ANSWER SECTION:
  #     corp.internal. 3600 IN DNSKEY 257 3 13 (
  #         abcdef0123456789abcdef0123456789abcdef01
  #         23456789abcdef0123456789abcdef0123456789
  #         ) ; KSK; alg=ECDSAP256SHA256; keyid=12345
  #     corp.internal. 3600 IN DNSKEY 256 3 13 (
  #         9876543210fedcba9876543210fedcba98765432
  #         10fedcba9876543210fedcba9876543210fedcba
  #         ) ; ZSK; alg=ECDSAP256SHA256; keyid=54321
  #
  #   关键字段:
  #     257 = KSK (Key Signing Key)    — 只有这个需要添加到 Trust Anchor
  #     256 = ZSK (Zone Signing Key)   — 不需要添加，由 KSK 签名保护
  #     13  = 算法 ECDSAP256SHA256
  #     3   = 协议(固定为3)
  #
  # ┌─────────────────────────────────────────────────────────────────────┐
  # │ 步骤 3: 从 DNSKEY 生成 DS 记录                                       │
  # └─────────────────────────────────────────────────────────────────────┘
  #
  #   方法 A — 使用 dnssec-dsfromkey (推荐):
  #     # 将步骤2的 DNSKEY 输出保存到文件
  #     dig DNSKEY corp.internal @权威DNS > /tmp/corp.keys
  #
  #     # 生成 DS 记录，-2 表示使用 SHA-256 摘要
  #     dnssec-dsfromkey -2 /tmp/corp.keys
  #
  #     输出示例:
  #       corp.internal. IN DS 12345 13 2 (
  #         a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6
  #         e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2 )
  #
  #   方法 B — 使用在线工具或 PowerShell:
  #     # 需要有 DNSKEY 的完整公钥和算法信息
  #     # DS = SHA256( 域名 | 标志(257) | 协议(3) | 算法 | 公钥 )
  #
  #   方法 C — 从 PowerDNS 数据库直接提取:
  #     pdnsutil show-zone corp.internal
  #     # 显示 DS 记录，可直接复制使用
  #
  # ┌─────────────────────────────────────────────────────────────────────┐
  # │ 步骤 4: 将 DS 记录添加到 Recursor 的 trustanchors                     │
  # └─────────────────────────────────────────────────────────────────────┘
  #
  #   DS 记录格式: KeyTag Algorithm DigestType DigestHex
  #                 │       │         │          └── 哈希值(去空格)
  #                 │       │         └── 2 = SHA-256
  #                 │       └── 13 = ECDSAP256SHA256
  #                 └── 12345 (密钥标签)
  #
  #   最终配置:
  #     trustanchors:
  #       - name: '.'
  #         dsrecords:
  #           - '20326 8 2 e06d44b80b8f1d39a95c0b0d7c65d08458e880409bbc683457104237c7f8ec8d'
  #           - '38696 8 2 683d2d0acb8c9b712a1948b27f741219298d0a450d612c483af444a4c0fb2b16'
  #       - name: 'corp.internal'
  #         dsrecords:
  #           - '12345 13 2 a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2'
  #
  # ┌─────────────────────────────────────────────────────────────────────┐
  # │ 步骤 5: 重载配置并验证                                                │
  # └─────────────────────────────────────────────────────────────────────┘
  #
  #     # 热重载配置
  #     rec_control reload-yaml
  #
  #     # 验证 DNSSEC 验证链是否正常工作
  #     dig +dnssec A www.corp.internal @127.0.0.1
  #     # 期望看到 ad (Authenticated Data) 标志，表示验证通过
  #
  #     # 如果失败，检查日志
  #     grep -i "dnssec\|bogus\|corp.internal" /var/log/syslog
  #
  #     # 使用 delv 做详细诊断
  #     delv +vtrace www.corp.internal @127.0.0.1
  #
  # ═══════════════════════════════════════════════════════════════════════
  # KSK 轮换 (Key Rollover) 注意事项
  # ═══════════════════════════════════════════════════════════════════════
  #
  #   当内部域的 KSK 需要轮换时，必须遵循"双签名"流程:
  #
  #   1) 添加新 KSK，同时保留旧 KSK（zone 中同时有两个 DNSKEY 257）
  #   2) 将新 KSK 的 DS 记录追加到 trustanchors（与旧 DS 共存）
  #      - name: 'corp.internal'
  #        dsrecords:
  #          - '12345 13 2 a1b2c3...'   # 旧 KSK，待移除
  #          - '67890 13 2 f9e8d7...'   # 新 KSK，刚添加
  #   3) 等待 TTL 过期（通常 1~7 天），确保所有缓存更新
  #   4) 从权威服务器移除旧 KSK，从 trustanchors 移除旧 DS 记录
  #
  # 重要提醒:
  #   - 不要随意添加公网域名的 TA，这会绕过正常的 DNSSEC 验证链
  #   - 根区 KSK 会定期轮换 (rollover)，建议配合 trustanchorfile 自动更新
  #   - 多个 name 相同的条目，dsrecords 会自动合并
  #   - 添加 TA 后该域名的验证只依赖 TA，不再检查父域 DS 记录
  #
  trustanchors: []
    # - name: '.'
    #   dsrecords:
    #     - '20326 8 2 e06d44b80b8f1d39a95c0b0d7c65d08458e880409bbc683457104237c7f8ec8d'
    #     - '38696 8 2 683d2d0acb8c9b712a1948b27f741219298d0a450d612c483af444a4c0fb2b16'

  # --------------------------------------------------------------------------
  # negative_trustanchors — 否定信任锚点 (Negative Trust Anchors)
  # --------------------------------------------------------------------------
  # 默认: []
  # 临时禁用某 zone 的 DNSSEC 验证。当某域名的 DNSSEC 配置错误导致大面积
  # 解析失败时使用。例如:
  #   - name: example.com
  #     reason: 'DNSSEC misconfiguration at registrar'
  #
  # 运行时可通过 rec_control add-nta / clear-nta 动态管理。
  #
  # 典型使用场景:
  #   1) 域名注册商误操作导致 DNSSEC 链断裂，整个域名无法解析
  #   2) 权威服务器 DNSSEC 签名过期未更新
  #   3) 内部域的 DNSSEC 临时维护期
  #   4) 紧急恢复: 添加 NTA → 恢复服务 → 排查根本原因 → 移除 NTA
  #
  # 重要警告:
  #   NTA 本质上是"关闭安全验证"，应仅在确认问题来源后临时使用。
  #   长期保留 NTA 意味着该域名的 DNS 数据不再受 DNSSEC 保护，
  #   可被中间人篡改。
  #
  # negative_trustanchors: []

  # --------------------------------------------------------------------------
  # trustanchorfile — 从文件加载信任锚点
  # --------------------------------------------------------------------------
  # 例如 Debian 的 /usr/share/dns/root.key
  #
  # 指向包含根区信任锚点信息的文件（如 IANA 根 KSK 公钥）。
  # 文件格式为 BIND 风格的 managed-keys 或 trust-anchors 格式。
  #
  # 优势:
  #   - 操作系统包管理器可自动更新此文件（如 Debian 的 dns-root-data 包）
  #   - KSK 轮换时无需手动修改配置
  #
  # 注意: 仅包含根区 TA。内部域 TA 仍需在 trustanchors 中手动配置。
  
  trustanchorfile: '/usr/share/dns/root.key'

  # --------------------------------------------------------------------------
  # trustanchorfile_interval — 信任锚点文件重新加载间隔
  # --------------------------------------------------------------------------
  # 默认: 24 小时。0 禁用定期重新加载。
  #
  # 定期从 trustanchorfile 重新读取根区信任锚点。
  # 确保在 IANA KSK 轮换时自动获取新密钥（如果 trustanchorfile 被更新）。
  #
  # trustanchorfile_interval: 24

  # --------------------------------------------------------------------------
  # nsec3_max_iterations — NSEC3 最大允许迭代次数
  # --------------------------------------------------------------------------
  # 默认: 50 (≥5.0，此前为 150/2500)
  # 超过此值的 NSEC3 记录视为 Insecure，防止 CPU 耗尽攻击。
  #
  # 背景:
  #   NSEC3 使用哈希迭代来防止 zone 遍历。但恶意 zone 可设置极高迭代次数
  #   （如 2500+），让验证者的 CPU 被大量哈希计算耗尽。
  #
  # 防护机制:
  #   Recursor 发现某个 zone 的 NSEC3 迭代次数超过此值时，
  #   视该 zone 为 Insecure（跳过 DNSSEC 验证），记录警告日志。
  #
  # 实际数字:
  #   - 50: 安全默认，大多数合法 zone 在 0~20 之间
  #   - 0: 禁用此检查（不推荐）
  #
  nsec3_max_iterations: 50

  # --------------------------------------------------------------------------
  # aggressive_nsec_cache_size — 激进 NSEC 缓存大小
  # --------------------------------------------------------------------------
  # 默认: 100000
  # >0 时启用 RFC 8198 的 NSEC/NSEC3 激进缓存，从否定回答中合成缓存。
  # 必须 DNSSEC 验证开启 (process/log-fail/validate)。
  # 运行时可通过 rec_control set-max-aggr-nsec-cache-size 调整。
  #
  # 激进缓存原理 (RFC 8198):
  #   当查询 www.example.com 收到 NSEC/NSEC3 否定回答（NXDOMAIN/NODATA）时，
  #   Recursor 可推断 example.com 下不存在的其他名字也是 NXDOMAIN，
  #   从而在后续查询中直接返回缓存答案，无需再向权威服务器查询。
  #
  # 例如:
  #   查询 fake.example.com → 收到 NSEC 证明其不存在
  #   查询 another-fake.example.com → 直接返回 NXDOMAIN（激进缓存合成）
  #
  # 性能收益: 减少 20%~40% 的否定查询出站流量
  # 内存开销: 每个 NSEC/NSEC3 证明约占 100~500 字节
  #
  aggressive_nsec_cache_size: 100000

  # --------------------------------------------------------------------------
  # aggressive_cache_min_nsec3_hit_ratio — 激进 NSEC3 缓存命中率下限
  # --------------------------------------------------------------------------
  # 默认: 2000
  # 值是 n，表示只有随机名命中 NSEC3 的概率 > 1/n 时才缓存。
  # 对于大 zone (NSEC3 覆盖面窄) 跳过缓存以节省 CPU。
  # 0 = 完全不缓存 NSEC3。
  #
  # 为什么需要此参数:
  #   大 zone（如 .com）的 NSEC3 覆盖面极窄，随机名命中概率极低。
  #   缓存这类 NSEC3 几乎永远不会被命中，白占内存和 CPU。
  #   此参数过滤掉这些"低价值"的 NSEC3 证明。
  #
  # 调优:
  #   - 2000 (默认): 只有覆盖率 >0.05% 的 zone 才缓存
  #   - 0: 完全不缓存 NSEC3（禁用激进缓存中的 NSEC3 部分）
  #   - 较小值: 更激进地缓存，包括覆盖面窄的大 zone
  #
  aggressive_cache_min_nsec3_hit_ratio: 2000

  # --------------------------------------------------------------------------
  # aggressive_cache_max_nsec3_hash_cost — 激进 NSEC3 缓存最大哈希开销
  # --------------------------------------------------------------------------
  # 默认: 150
  # 估算的 NSEC3 哈希开销（迭代次数 × 标签数）超过此值则不做激进缓存。
  #
  # 保护 Recursor 不被高迭代次数的 NSEC3 记录拖累：
  #   每次验证 NSEC3 都需要计算哈希，迭代次数越高越消耗 CPU。
  #   如果 NSEC3 的哈希计算成本超过此阈值，放弃激进缓存该 NSEC3。
  #
  aggressive_cache_max_nsec3_hash_cost: 150

  # --------------------------------------------------------------------------
  # signature_inception_skew — 签名生效时间偏差容忍
  # --------------------------------------------------------------------------
  # 默认: 60 秒
  # 允许签名 inception 时间偏差这么多秒，解决时钟不同步问题。
  #
  # DNSSEC 签名包含严格的生效（inception）和过期（expiration）时间。
  # 如果 Recursor 的系统时钟与权威服务器存在偏差，可能认为有效签名无效。
  # 此参数允许签名生效时间有 N 秒的容差。
  #
  # 建议:
  #   - 60 (默认): 适度容差，覆盖大多数 NTP 同步偏差
  #   - 0: 严格按签名时间验证（需要精确 NTP 同步）
  #   - 300: 宽松容差，但可能接受"尚未生效"的签名
  #
  signature_inception_skew: 60

  # --------------------------------------------------------------------------
  # max_signature_validations_per_query — 每查询最大签名验证次数
  # --------------------------------------------------------------------------
  # 默认: 30
  #
  # 限制单次客户端查询中执行的 DNSSEC 签名验证操作次数上限。
  # 防止恶意构造的复杂 DNSSEC 链（嵌套 CNAME + 每层都需要验证签名）
  # 耗尽 Recursor CPU 资源。
  #
  # 正常值: 一次简单查询需要 1~5 次签名验证
  # 超过后: 终止验证，返回 Bogus / ServFail
  #
  max_signature_validations_per_query: 30

  # --------------------------------------------------------------------------
  # max_rrsigs_per_record — 每条记录最大 RRSIG 检查数
  # --------------------------------------------------------------------------
  # 默认: 2
  #
  # 每条 DNS 记录可能有多个 RRSIG 签名（如双算法签名场景）。
  # 此参数限制 Recursor 对单条记录检查的 RRSIG 数量。
  # 超过此数后忽略多余的 RRSIG。
  #
  # 正常值: 每条记录 1~2 个 RRSIG（常规签名 + 算法过渡期）
  #
  max_rrsigs_per_record: 2

  # --------------------------------------------------------------------------
  # max_dnskeys — 同算法同 tag 的最大 DNSKEY 数
  # --------------------------------------------------------------------------
  # 默认: 2。设为 1 禁止 DNSKEY tag 碰撞。
  #
  # DNSKEY tag 碰撞（两个不同密钥有相同 KeyTag 值）是安全风险，
  # 可能导致验证者用错误的公钥验证签名。
  # 设为 1 完全禁止碰撞，但可能拒绝某些合法的多 KSK 配置。
  #
  max_dnskeys: 2

  # --------------------------------------------------------------------------
  # max_ds_per_zone — 每 zone 最大 DS 记录数
  # --------------------------------------------------------------------------
  # 默认: 8
  #
  # 限制每个 zone 允许的 DS 记录数量。DS 记录过多可能暗示配置错误
  # 或尝试利用 DNSSEC 验证消耗资源。
  #
  # 大多数合法 zone 只有 1~2 条 DS 记录。
  #
  max_ds_per_zone: 8

  # --------------------------------------------------------------------------
  # max_nsec3_hash_computations_per_query — 每查询最大 NSEC3 哈希计算次数
  # --------------------------------------------------------------------------
  # 默认: 600
  #
  # 限制单次查询中 NSEC3 哈希计算的次数上限。
  # NSEC3 迭代哈希是 DNSSEC 验证中 CPU 开销最大的操作之一。
  # 超过此限制后停止 NSEC3 验证，返回 Bogus/ServFail。
  #
  max_nsec3_hash_computations_per_query: 600

  # --------------------------------------------------------------------------
  # max_nsec3s_per_record — 每条记录最大 NSEC3 数
  # --------------------------------------------------------------------------
  # 默认: 10
  #
  # 限制单条记录关联的 NSEC3 证明数量。
  # 过多的 NSEC3 通常意味着 zone 配置异常或存在恶意意图。
  #
  max_nsec3s_per_record: 10

  # --------------------------------------------------------------------------
  # disabled_algorithms — 禁用的 DNSSEC 算法
  # --------------------------------------------------------------------------
  # 默认: [] (自动禁用 RSASHA1)
  # 在强加密策略的系统（如 RHEL9）上，RSASHA1 会自动禁用。
  # 显式列表: ['5', '7'] 分别表示 RSASHA1 和 RSASHA1NSEC3SHA1。
  #
  # 算法编号参考:
  #   5  = RSASHA1 (已过时，被 RFC 8624 废弃)
  #   7  = RSASHA1-NSEC3-SHA1
  #   8  = RSASHA256
  #   10 = RSASHA512
  #   13 = ECDSAP256SHA256
  #   14 = ECDSAP384SHA384
  #   15 = Ed25519
  #   16 = Ed448
  #
  # 场景:
  #   - 高安全环境: 禁用 SHA-1 算法 (['5', '7'])
  #   - 兼容旧域名: 保留所有算法 ([])
  #
  # disabled_algorithms: []

  # --------------------------------------------------------------------------
  # log_bogus — 记录 Bogus 验证失败
  # --------------------------------------------------------------------------
  # 默认: false
  # 企业建议开启以便监控 DNSSEC 问题。
  #
  # 开启后所有 DNSSEC 验证失败的查询都会被记录，包含:
  #   - 查询的域名
  #   - 失败原因（签名过期、信任链断裂、算法不支持等）
  #   - 返回给客户端的错误码
  #
  # 监控价值:
  #   - 发现 DNSSEC 配置错误（自己或上游）
  #   - 检测缓存投毒尝试
  #   - 排查"某些网站打不开"的根因
  #
  # 性能影响: 轻微（Bogus 响应比例通常低于 1%）
  #
  log_bogus: true

  # --------------------------------------------------------------------------
  # x_dnssec_names — 独立统计的 DNSSEC 域名
  # --------------------------------------------------------------------------
  # 默认: []
  # 后缀匹配这些名字的验证结果统计到 x-dnssec-result-* 指标中。
  # 用于将已知的测试域名与正常生产指标分开。
  #
  # 例如添加 'test.dnssec-tools.org' 后，该域及其子域的验证结果
  # 会单独统计在 x-dnssec-result-bogus、x-dnssec-result-secure 等指标中，
  # 不与整体 DNSSEC 统计混合。
  #
  # x_dnssec_names: []



