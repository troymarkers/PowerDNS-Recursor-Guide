# ===========================================================================
# 日志 — Logging
# ===========================================================================
# 概述:
#   Recursor 的日志系统支持多种输出目标、灵活的控制级别和结构化格式。
#   合理配置日志是运维 DNS 服务的基础——既要能看到关键问题，又不能被
#   海量日志淹没。
#
# 日志输出路径:
#   Recursor → stdout    → systemd journal (journalctl)
#            → syslog    → /var/log/syslog (通过 rsyslog/syslog-ng)
#            → protobuf  → 外部事件收集器 (dnsdist/自定义分析)
#
# 核心配置决策:
#   1. 日志级别: 生产环境用 4 (warning)，调试时临时调至 6~7
#   2. 安静模式: 保持 true，不记录每个查询
#   3. syslog vs journal: systemd 环境关闭 syslog，避免重复
#   4. 结构化格式: 保持 true，方便日志平台解析
# ===========================================================================

logging:

  # =========================================================================
  # loglevel — 日志等级
  # =========================================================================
  # 默认: 6 (info)
  #
  # 数字越小越严重。日志仅输出等级 ≤ 此值的消息。
  #
  # 等级对照表:
  #   0 = emerg   系统不可用（极少使用）
  #   1 = alert   必须立即处理（如检测到入侵）
  #   2 = crit    严重故障（如配置文件损坏）
  #   3 = error   错误但服务仍运行（如无法连接到某 NS 服务器）
  #   4 = warning 潜在问题（DNSSEC 验证失败、服务器被限流）★生产推荐
  #   5 = notice  值得注意的正常事件（配置重载、zone 传输完成）
  #   6 = info    一般信息（启动、关闭、统计摘要）★默认
  #   7 = debug   详细调试（可能包含查询内容和敏感数据）
  #
  # 生产环境: 4 (warning) — 不错过任何问题，也不被噪声淹没
  # 调试期间: 6~7 (info/debug) — 更多上下文帮助定位问题
  #
  loglevel: 4

  # =========================================================================
  # quiet — 安静模式（不记录每个查询）
  # =========================================================================
  # 默认: true
  #
  # true:  不记录每个 DNS 查询的日志（推荐生产环境）
  # false: 每次客户端查询都记录一条日志，包含:
  #   - 客户端 IP 和端口
  #   - 查询的域名和记录类型
  #   - 响应码 (NOERROR/NXDOMAIN/SERVFAIL)
  #   - 响应延迟
  #
  # 注意: quiet=false 在高 QPS 下会产生巨大日志量！
  #   1000 QPS × 86400 秒 = 8640 万条/天 ≈ 每天数十 GB 日志
  #   仅在故障排查时临时使用，用后立即恢复 true。
  #
  quiet: true

  # =========================================================================
  # disable_syslog — 禁用 syslog 输出
  # =========================================================================
  # 默认: false
  #
  # 控制 Recursor 是否向 syslog (/dev/log) 写入日志。
  #
  # 两个日志通道:
  #   - stdout: 标准输出，被 systemd/Docker 自动捕获
  #   - syslog: 传统 Unix 日志系统，需 rsyslog/syslog-ng 守护进程
  #
  # 默认行为 (disable_syslog=false):
  #   Recursor 同时向 syslog 和 stdout 写入日志 → 日志重复
  #
  # 推荐行为 (disable_syslog=true):
  #   Recursor 仅向 stdout 写入 → systemd 捕获 → journalctl 查看
  #
  # 何时必须关闭 (false):
  #   - 使用传统 sysvinit（无 systemd journal）
  #   - 日志集中采集依赖 syslog facility 路由
  #   - 容器中运行 syslog sidecar
  #
  # 何时必须开启 (true):  ★ 推荐
  #   - systemd 管理（绝大多数现代 Linux 发行版）
  #   - Docker/Podman 容器环境
  #   - 使用结构化日志 + stdout 采集（如 Fluentd/Vector 抓取 stdout）
  #
  disable_syslog: true

  # =========================================================================
  # timestamp — 日志时间戳
  # =========================================================================
  # 默认: true
  #
  # 每条日志前缀附带 ISO 8601 格式时间戳（精确到微秒）。
  # 在 journald 环境中 timestamp 可能冗余（journald 自带时间戳），
  # 但保留对直接阅读 stdout 输出的场景有用。
  #
  timestamp: true

  # =========================================================================
  # common_errors — 记录常见错误
  # =========================================================================
  # 默认: false
  #
  # DNS 中某些"错误"实际上极为常见且不构成问题:
  #   - NXDOMAIN: 客户端查询不存在的域名（公网递归中可能占 10~30%）
  #   - REFUSED: 某些权威故意拒绝递归查询
  #   - 超时重试: 网络拥塞导致的瞬时超时
  #
  # 设为 false 排除这些噪声，只关注需要运维关注的异常事件。
  #
  common_errors: false

  # =========================================================================
  # trace — 详细追踪（每条查询的完整解析过程）
  # =========================================================================
  # 默认: 'no'
  # 可选: 'no' | 'yes' | 'fail'
  #
  # no:   不追踪（正常生产模式）
  # yes:  记录每个查询的每一步解析过程:
  #       - 向哪个 NS 服务器发了什么查询
  #       - 等待了多久收到响应或超时
  #       - DNSSEC 验证的每一步
  #       → 日志量巨大（每查询 10~50 行），仅在调试单个域名时使用！
  # fail: 仅记录最终以 ServFail 结束的查询的追踪信息
  #       → 日志量适中，适合排查"为什么某些域名解析失败"
  #
  # 性能影响: trace=yes 严重降低性能（每步都要写日志）
  # 临时启用建议: 通过 rec_control trace <domain> 对特定域名启用
  #
  trace: 'no'

  # =========================================================================
  # rpz_changes — 记录 RPZ 规则变更
  # =========================================================================
  # 默认: false
  #
  # 开启后，每次 RPZ 传输 (AXFR) 完成或本地文件重载后，
  # 以 INFO (6) 级别记录新增/删除的拦截规则数。
  #
  # 建议开启的场景:
  #   - 使用远程 RPZ AXFR 自动更新（需要知道何时获取了新规则）
  #   - 安全运营团队需要审计 RPZ 变更历史
  #
  rpz_changes: false

  # =========================================================================
  # statistics_interval — 统计摘要输出间隔（秒）
  # =========================================================================
  # 默认: 1800 (30 分钟)
  # 0 = 禁用定期统计输出
  #
  # Recursor 定期输出运行统计摘要到日志，包含:
  #   - 缓存命中率 (packetcache + recordcache)
  #   - 每秒查询数 (QPS)
  #   - 响应延迟分布 (平均/P50/P95/P99)
  #   - 并发查询数
  #
  # 这些统计数据对于离线分析和容量规划非常有价值。
  #
  # 调优:
  #   - 1800 (30min): 默认，在日志量和数据粒度之间平衡
  #   - 3600 (60min): 长周期趋势分析
  #   - 300  (5min): 细粒度监控（日志量增加 6x）
  #   - 0: 禁用（依赖外部监控如 Prometheus 采集 API 指标时）
  #
  statistics_interval: 1800

  # =========================================================================
  # structured_logging — 结构化日志
  # =========================================================================
  # 默认: true (≥5.1 不支持关闭)
  #
  # 输出键值对格式而非传统自由文本，例如:
  #   msg="Question" question="www.example.com|A" qtype="A" remote="10.0.0.1:54321"
  #
  # 优点:
  #   - 易于日志平台解析（ELK、Loki、Splunk 等可直接索引字段）
  #   - 支持精确过滤（如 grep 'qtype="AAAA"' 匹配所有 AAAA 查询）
  #   - 避免自由文本中的歧义
  #
  structured_logging: true

  # =========================================================================
  # structured_logging_backend — 结构化日志后端
  # =========================================================================
  # 默认: 'default'
  # 可选: 'default' | 'systemd-journal' | 'json'
  #
  # default:
  #   标准键值对格式，输出到 stdout/syslog。
  #   格式: key1="value1" key2="value2"
  #   适合: 直接阅读、简单 grep 过滤、Logstash kv{} 插件解析
  #
  # systemd-journal:
  #   直接写入 systemd journal（通过 sd_journal_send() API）。
  #   日志中自动附带 systemd 元数据（UNIT、PID、_TRANSPORT 等）。
  #   适合: 纯 systemd 环境，与 journald 生态集成
  #   注意: 需要编译时开启 systemd 支持
  #
  # json:
  #   每条日志为一个 JSON 对象，输出到 stdout。
  #   格式: {"msg":"Question","question":"example.com|A","qtype":"A"}
  #   适合: ELK (Filebeat JSON 解析)、Loki (JSON pipeline)、
  #         Grafana (LogQL JSON 查询)、Datadog/Splunk 等
  #   优点: 最易于自动化处理，字段类型明确（数字就是数字，非字符串）
  #   缺点: 人类直接阅读不如 default 格式直观
  #
  # 建议:
  #   - 小型部署/default: 'default'
  #   - systemd-only: 'systemd-journal'
  #   - 日志平台: 'json' ★（推荐配合 Loki/ELK）
  #
  # structured_logging_backend: 'default'
