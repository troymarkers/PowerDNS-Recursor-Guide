# ===========================================================================
# 递归行为核心 — Recursor Core
# ===========================================================================
# 概述:
#   控制 Recursor 的核心递归解析行为，包括线程模型、查询深度限制、
#   QName Minimization、转发策略和 RPZ DNS 防火墙。
#
# 核心关注点:
#   - threads / tcp_threads: 并发处理能力 —— 按 CPU 核数调整
#   - forward_zones: 内部域权威转发 —— 企业环境必备
#   - rpzs: DNS 防火墙 —— 多层 RPZ 规则（白名单 → 黑名单 → 威胁情报）
#   - qname_minimization: 查询名最小化 —— 隐私增强，建议开启
#
# 典型场景:
#   - 纯递归: threads=CPU核数 + forward_zones=[]
#   - 企业内网: threads=4~8 + forward_zones=内部域
#   - 安全优先: rpzs=多层防护 + qname_minimization=true
# ===========================================================================

recursor:

  # --------------------------------------------------------------------------
  # threads — 工作线程数
  # --------------------------------------------------------------------------
  # 默认: 2
  # 处理 DNS 解析逻辑的线程数。建议 = CPU 核心数。
  #
  # 设为 CPU 核心数可最大化并发处理能力。
  # 注意: 总线程数 = threads + tcp_threads + (如果 pdns_distributes_queries 开启) distributor_threads。
  #       不要将所有线程绑到同一物理核。
  #
  threads: 4

  # --------------------------------------------------------------------------
  # tcp_threads — TCP 处理线程数
  # --------------------------------------------------------------------------
  # 默认: 1 (≥5.0)
  #
  # 专门处理入站 TCP DNS 查询的线程数。TCP 连接采用 accept() 分发模式，
  # 由这些线程独立处理。
  #
  # 现代 DNS 使用 TCP 越来越多（DoT/DoH 回退、大响应、AXFR）。
  # 建议至少 2（尤其在使用 RPZ 远程 AXFR 时）。
  #
  tcp_threads: 2

  # --------------------------------------------------------------------------
  # max_mthreads — 最大并发 MTasker 线程
  # --------------------------------------------------------------------------
  # 默认: 2048（每 worker 线程）
  # 每个 worker 线程能同时处理的并发解析任务数。
  #
  # MTasker 是 Recursor 的轻量级用户态协程/任务。每个出站查询对应
  # 一个 MTasker 任务。此值限制每个 worker 线程的同时活跃任务数。
  #
  # 高并发时需要足够大: 假设 4 worker × 2048 = 最多 8192 并发解析。
  # 内存: 每个 MTasker 占用 stack_size 字节栈空间。
  #
  max_mthreads: 2048

  # --------------------------------------------------------------------------
  # max_recursion_depth — 最大递归深度
  # --------------------------------------------------------------------------
  # 默认: 16 (≥4.9，此前为 40)
  # CNAME 链长和深度委托都会计入。0 无限制。
  #
  # 递归深度 = CNAME 链长度 + DNS 层级深度（根→TLD→二级域→...）。
  # 超过后返回 ServFail，防止无限递归。
  #
  # 正常值: 5~8；CNAME 链短时很少超过 8。
  # 设太大可能被恶意构造的 CNAME 环形链耗尽资源。
  #
  max_recursion_depth: 16

  # --------------------------------------------------------------------------
  # max_cnames_followed — 最大 CNAME 跟随长度
  # --------------------------------------------------------------------------
  # 默认: 10 (≥5.1)
  # 超过返回 ServFail。
  #
  # 限制单次查询中的 CNAME 链长度。防止 CNAME 循环或过长链消耗资源。
  # 例如 a→CNAME b→CNAME c→... 超过 10 步即终止。
  #
  max_cnames_followed: 10

  # --------------------------------------------------------------------------
  # max_total_msec — 单查询最大总耗时
  # --------------------------------------------------------------------------
  # 默认: 7000 毫秒
  # 0 无限制。
  #
  # 从收到客户端查询到返回响应的最大时间。超时后返回 ServFail。
  # 保护 Recursor 不被慢速解析（如故障的权威服务器）耗尽并发槽位。
  #
  # 建议: 2000~7000ms。太短可能在高延迟链路中误判，太长影响用户体验。
  #
  max_total_msec: 7000

  # --------------------------------------------------------------------------
  # max_chain_length — 最大请求链长度
  # --------------------------------------------------------------------------
  # 默认: 0 (无限制)
  # 合并到同一出站请求链的最大内部请求数。减少链长可缓解出站流量突发。
  #
  # Recursor 内部会将向同一权威服务器的多个查询合并为一次出站请求。
  # 此参数限制合并的查询数量。0 不限制。
  # 降低此值可让出站流量更均匀分布，避免大突发。
  #
  # max_chain_length: 0

  # --------------------------------------------------------------------------
  # stack_size — mthread 栈大小 (字节)
  # --------------------------------------------------------------------------
  # 默认: 200000
  #
  # 每个 MTasker 协程的栈空间大小。过小导致栈溢出，过大浪费内存。
  # 200000 字节 ≈ 200KB，是经过生产验证的安全值。
  #
  stack_size: 200000

  # --------------------------------------------------------------------------
  # stack_cache_size — mthread 栈缓存数
  # --------------------------------------------------------------------------
  # 默认: 100 (每线程)
  # 缓存 mthread 栈用于复用，减少 CPU 开销。
  #
  # MTasker 创建/销毁频繁，预分配栈空间可避免每次 malloc/free。
  # 每个栈 stack_size 字节，100 × 200KB = 20MB 每线程。
  #
  # stack_cache_size: 100

  # --------------------------------------------------------------------------
  # minimum_ttl_override — 最小 TTL 强制提升
  # --------------------------------------------------------------------------
  # 默认: 1
  # 将所有 TTL 提升到至少此值。>1 违规 RFC 但大幅提升缓存命中率。
  # 0 会导致 TTL=0 记录每次都被重新查询，严重影响性能。
  #
  # TTL=0 的记录（如果网站想实现"不缓存"）每次查询都得上游权威重新请求，
  # 对 Recursor 和权威服务器都是极大的负载。强制最小 TTL=1 可缓解。
  #
  minimum_ttl_override: 1

  # --------------------------------------------------------------------------
  # qname_minimization — 查询名最小化
  # --------------------------------------------------------------------------
  # 默认: true
  # 实现 RFC 9156 的 QName Minimization。
  # 向各级权威只发送最少的必要标签，减少隐私泄露。
  # 例如查 www.example.com 时向根只问 com，向 .com 只问 example.com。
  #
  # 隐私收益: 根服务器只知道你在查询 .com，.com 服务器只知道你在查 example.com。
  # 权威权限: 只有 example.com 的权威知道你查了完整的 www.example.com。
  #
  qname_minimization: true

  # --------------------------------------------------------------------------
  # qname_max_minimize_count — 最小化最大迭代次数
  # --------------------------------------------------------------------------
  # 默认: 10
  # RFC 9156 "max minimize count" 参数。
  #
  # QName Minimization 将全名拆分为标签逐个查询。此参数限制最小化
  # 过程的总迭代次数上限。超过后停止最小化，直接发送完整查询名。
  #
  qname_max_minimize_count: 10

  # --------------------------------------------------------------------------
  # qname_minimize_one_label — 单标签最小化迭代次数
  # --------------------------------------------------------------------------
  # 默认: 4
  # RFC 9156 "minimize one label" 参数。前 N 次迭代每次只追加 1 个标签。
  #
  # 例如查 www.example.com: 前 4 次迭代每次都只多 1 个标签
  #   → com → example.com → www.example.com
  # 4 次之后可一次追加多个标签以加速完成。
  #
  qname_minimize_one_label: 4

  # --------------------------------------------------------------------------
  # nothing_below_nxdomain — NXDOMAIN 下无数据
  # --------------------------------------------------------------------------
  # 默认: dnssec
  # 实现 RFC 8020。当缓存中有 NXDOMAIN 时，其下所有子域直接返回 NXDOMAIN。
  #   no      — 不启用
  #   dnssec  — 仅对 DNSSEC 验证过的 NXDOMAIN 启用 ★推荐
  #   yes     — 对所有非 Bogus NXDOMAIN 启用
  #
  # 例如: 缓存中 example.com = NXDOMAIN，则查询 www.example.com 无需
  #       向上游权威查询，直接返回 NXDOMAIN。极大减少无效查询流量。
  #
  nothing_below_nxdomain: dnssec

  # --------------------------------------------------------------------------
  # root_nx_trust — 信任根的 NXDOMAIN
  # --------------------------------------------------------------------------
  # 默认: true
  # 根服务器返回 NXDOMAIN 则整个 TLD 都视为不存在。
  #
  # 例如根返回 .invalid = NXDOMAIN，则 anything.invalid 都立即
  # 返回 NXDOMAIN 而不发起任何上游查询。
  #
  root_nx_trust: true

  # --------------------------------------------------------------------------
  # save_parent_ns_set — 保存父级 NS 集合
  # --------------------------------------------------------------------------
  # 默认: true
  # 如果子级权威 NS 集合不可用，回退到父级 NS 集合。
  #
  # DNS 委托中的 NS 记录存在于两级: 父级（在上级 zone 中注册的 NS）和
  # 子级（zone 自身顶部的 NS）。两者通常一致但偶尔不同（如迁移期间）。
  # 开启后子级 NS 不可达时自动尝试父级 NS 作为备用。
  #
  save_parent_ns_set: true

  # --------------------------------------------------------------------------
  # extended_resolution_errors — 扩展解析错误
  # --------------------------------------------------------------------------
  # 默认: true (≥5.0)
  # 在解析失败时附带 EDNS Extended Error (RFC 8914) 解释原因。
  #
  # 例如 ServFail 时告知客户端:
  #   - "DNSSEC Bogus" — 验证失败
  #   - "DNS 解析超时" — 上游无响应
  #   - "CNAME 链过长" — 循环或深度过大
  # 帮助客户端和调试工具理解失败原因而非简单的 SERVFAIL。
  #
  extended_resolution_errors: true

  # --------------------------------------------------------------------------
  # any_to_tcp — 入站 ANY 查询截断到 TCP
  # --------------------------------------------------------------------------
  # 默认: true (≥5.4)
  # 缓解 ANY 反射放大攻击。
  #
  # 客户端发来的 ANY 类型查询，Recursor 返回 TC(截断)标记而非完整响应。
  # 客户端须用 TCP 重试。TCP 无法伪造源 IP，从而阻止利用 ANY 查询做
  # UDP 反射放大攻击。注意: 此参数控制入站行为，outgoing.any_to_tcp 控制出站。
  #
  any_to_tcp: true

  # --------------------------------------------------------------------------
  # hint_file — 根提示文件
  # --------------------------------------------------------------------------
  # 默认: 空 (使用内置根提示)
  # 设为 'no' 禁用根提示处理（如全部转发时）。
  # 设为 'no-refresh' 禁用根提示处理和根 NS 定期刷新。
  #
  # 'no': 完全不用根提示，适合纯转发模式。
  # 'no-refresh': 用内置根提示启动，但不定期查询根 NS 更新。
  #
  hint_file: '/usr/share/dns/root.hints'

  # --------------------------------------------------------------------------
  # serve_rfc1918 — 对 RFC 1918 反向区域权威应答
  # --------------------------------------------------------------------------
  # 默认: true
  # 减少对 AS112 服务器的负载。
  #
  # 本地应答 10.in-addr.arpa 等 RFC 1918 私有地址段的反向查询，
  # 不向公网 DNS 发起查询。这些查询在公网无论如何也得不到有效答案。
  #
  serve_rfc1918: true

  # --------------------------------------------------------------------------
  # serve_rfc6303 — 对其他 RFC 6303 区域权威应答
  # --------------------------------------------------------------------------
  # 默认: true (≥5.1.3)
  # 需 serve_rfc1918 开启。
  #
  # 本地应答更多保留/特殊 DNS 区域（localhost、ip6.arpa 等），
  # 进一步减少不必要的上游查询。
  #
  serve_rfc6303: true

  # --------------------------------------------------------------------------
  # dns64_prefix — DNS64 前缀
  # --------------------------------------------------------------------------
  # 默认: 空 (不启用)
  # 设置为 /96 的 IPv6 前缀以启用 DNS64（RFC 6147）。
  # 为仅有 A 记录的域名合成 AAAA 记录。
  # 常用前缀: 64:ff9b::/96 (RFC 6052 知名前缀)
  #
  # DNS64 是 NAT64 部署的关键组件：IPv6-only 客户端访问 IPv4-only 服务时，
  # Recursor 将 A 记录嵌入一个 /96 前缀中合成 AAAA 记录返回。
  #
  # dns64_prefix: '64:ff9b::/96'

  # --------------------------------------------------------------------------
  # security_poll_suffix — 安全更新查询域名
  # --------------------------------------------------------------------------
  # 默认: secpoll.powerdns.com.
  #
  # Recursor 会定期查询此域名下的 TXT 记录，检查当前运行的版本是否存在
  # 已知安全漏洞或严重 Bug。如果发现安全问题，Recursor 会在日志中告警。
  #
  # 工作原理:
  #   1) Recursor 启动后及之后每 24 小时，构造一个 DNS 查询:
  #      <版本号>.security_poll_suffix 类型 TXT
  #      例如: 5.2.1.secpoll.powerdns.com. TXT
  #
  #   2) 如果该记录存在且值不为 "OK"，说明该版本存在已知安全问题。
  #      Recursor 会在日志中记录告警信息（日志等级 Warning）。
  #
  #   3) 如果该记录返回 NXDOMAIN（不存在），说明此版本安全，无已知问题。
  #
  #   4) 如果无法解析该域名（网络不通等），告警被抑制，不会误报。
  #
  # 查询流程:
  #   ┌───────────┐    TXT? 5.2.1.secpoll.powerdns.com.    ┌──────────────────┐
  #   │ Recursor  │ ──────────────────────────────────────→ │ secpoll.powerdns │
  #   │  v5.2.1   │ ←────────────────────────────────────── │ .com. (权威DNS)  │
  #   └───────────┘    应答: "有安全漏洞 CVE-2024-xxxx"      └──────────────────┘
  #                      或 NXDOMAIN (版本安全)
  #
  # 可选值:
  #   'secpoll.powerdns.com.'         — 官方安全公告源（默认，推荐）
  #   'secpoll.powerdns.com.          — 同上（尾随点可选）
  #   '' (空字符串)                    — 禁用安全更新查询
  #   'internal-secpol.company.com.'  — 自定义内部安全公告服务
  #
  # 禁用场景:
  #   - 隔离网络（无互联网访问），查询必然失败，禁用以避免超时
  #   - 使用自己的版本管理和安全扫描流程
  #   - 不希望 Recursor 有任何外连行为
  #
  #   # 禁用方式:
  #   security_poll_suffix: ''
  #
  # 自建安全公告服务:
  #   如果你的网络完全隔离（无公网 DNS），可以自建一个权威 DNS 来提供
  #   内部版本安全状态。例如:
  #
  #   # 1. 在内网权威 DNS 上创建 zone
  #   # 2. 为每个部署的版本添加 TXT 记录
  #   # 3. 安全的版本返回 NXDOMAIN（或不添加记录）
  #   # 4. 有问题的版本返回告警文本
  #
  #   # zone: internal-secpol.company.com.
  #   4_5_7.internal-secpol.company.com.  IN TXT "CVE-2025-xxxx: 请升级到4.5.8+"
  #   # 4.5.8 无记录 → NXDOMAIN → 安全
  #
  # 注意: 版本号中的点会被替换为下划线或横线作为查询标签。
  #
  security_poll_suffix: 'secpoll.powerdns.com.'

  # --------------------------------------------------------------------------
  # server_id — 服务器 ID
  # --------------------------------------------------------------------------
  # 默认: 主机名
  # 响应 id.server CHAOS TXT 和 NSID EDNS 选项的值。
  # 设为 'disabled' 禁用。
  #
  # 用于在分布式部署中标识不同的 Recursor 实例。
  # 通过 dig id.server CHAOS TXT @recursor-ip 可查询。
  # 安全注意: 可能泄露主机名，生产环境建议自定义或禁用。
  #
  # server_id: ''

  # --------------------------------------------------------------------------
  # version_string — 版本字符串
  # --------------------------------------------------------------------------
  # 默认: 真实版本号
  # 响应 version.bind CHAOS TXT 的值。安全建议自定义隐藏真实版本。
  #
  # 攻击者可能根据版本号针对特定漏洞发起攻击。
  # 隐藏版本号是安全最佳实践，但不应作为唯一的安全措施。
  #
  version_string: 'Served by PowerDNS'

  # --------------------------------------------------------------------------
  # setuid / setgid — 降权运行
  # --------------------------------------------------------------------------
  # 启动后切换到此用户/组。
  #
  # Recursor 通常以 root 启动（需要绑定 53 端口），之后切换到非特权用户。
  # 这是安全最佳实践：即使 Recursor 被入侵，攻击者也只有低权限。
  #
  # setuid: 'pdns-recursor'
  # setgid: 'pdns-recursor'

  # --------------------------------------------------------------------------
  # daemon — 后台运行
  # --------------------------------------------------------------------------
  # 默认: false
  # systemd 或 Docker 管理时不要开启。
  #
  # false: Recursor 在前台运行，systemd/Docker 捕获 stdout 并管理进程生命周期。
  # true:  传统 daemon 模式，fork 到后台。
  #
  daemon: false

  # --------------------------------------------------------------------------
  # write_pid — 写入 PID 文件
  # --------------------------------------------------------------------------
  # 默认: true
  #
  # 将 Recursor 进程 ID 写入 socket_dir/recursor.pid。
  # 用于 init 脚本/systemd 管理进程生命周期。false 禁用。
  #
  write_pid: true

  # --------------------------------------------------------------------------
  # socket_dir — 控制套接字和 PID 目录
  # --------------------------------------------------------------------------
  # 默认: 编译时决定（通常 /var/run 或 /run）
  #
  # rec_control 命令通过此目录下的 Unix socket 与 Recursor 通信。
  # PID 文件也写在此目录。需确保运行 Recursor 的用户有写权限。
  #
  # socket_dir: '/var/run'

  # --------------------------------------------------------------------------
  # chroot — chroot 目录
  # --------------------------------------------------------------------------
  # 不推荐。建议使用 systemd 的沙盒功能替代。
  #
  # chroot 限制 Recursor 只能访问指定目录树。是传统的安全隔离方式，
  # 但配置复杂（需要将 /dev、/etc/resolv.conf 等复制到 chroot 目录）。
  # systemd 的 ProtectSystem=strict + PrivateTmp=yes 等更简单有效。
  #
  # chroot: ''

  # --------------------------------------------------------------------------
  # config_dir — 配置目录
  # --------------------------------------------------------------------------
  # 默认: 编译时 SYSCONFDIR（通常 /etc/powerdns）
  #
  # config_dir: '/etc/powerdns'

  # --------------------------------------------------------------------------
  # include_dir — 额外配置目录（已由主配置 recursor.yml 统一管理）
  # --------------------------------------------------------------------------
  # 此处注释掉，避免重复扫描。如需额外目录，在主配置中修改。
  # include_dir: '/etc/powerdns/recursor.d'

  # --------------------------------------------------------------------------
  # cpu_map — CPU 亲和性
  # --------------------------------------------------------------------------
  # 绑定线程到指定 CPU。格式: "线程ID=CPU" 空格分隔。
  #   cpu_map: '0=0 1=1,2' — 线程0绑定CPU0，线程1绑定CPU1和CPU2
  #
  # 在高性能场景中减少 CPU 缓存失效和上下文切换。
  # 一般不需要设置，Linux 调度器通常能做得很好。
  #
  # cpu_map: ''

  # --------------------------------------------------------------------------
  # public_suffix_list_file — 公共后缀列表文件
  # --------------------------------------------------------------------------
  # 用于 top-queries 统计时的域名分组。
  #
  # 引用 Mozilla 公共后缀列表（Public Suffix List），帮助 Recursor
  # 在 top-queries 统计中将子域聚合到注册域名级别。
  # 例如 grouping www.example.co.uk → example.co.uk。
  # 留空则使用内置的基础后缀列表。
  #
  # public_suffix_list_file: ''

  # --------------------------------------------------------------------------
  # stats_ringbuffer_entries — 统计环缓冲区条目
  # --------------------------------------------------------------------------
  # 默认: 10000
  # rec_control top-remotes 使用的远程查询统计缓冲区大小。
  #
  # 存储最近查询的客户端 IP 统计，用于 top-remotes 命令。
  # 更大 = 更多统计数据，但内存占用也更高。
  #
  stats_ringbuffer_entries: 10000

  # --------------------------------------------------------------------------
  # latency_statistic_size — 延迟统计采样数
  # --------------------------------------------------------------------------
  # 默认: 10000
  #
  # 保留最近多少次查询的延迟数据用于统计计算。
  # 更大的值提供更平滑的统计数据，但内存消耗略增。
  #
  latency_statistic_size: 10000

  # --------------------------------------------------------------------------
  # allow_trust_anchor_query — 允许查询信任锚点
  # --------------------------------------------------------------------------
  # 默认: false
  # 设为 true 时 trustanchor.server CH TXT 查询返回配置的信任锚点。
  # 安全注意: 这可能暴露内部配置。
  #
  # 建议保持 false，除非需要远程验证 TA 配置是否正确（调试场景）。
  #
  allow_trust_anchor_query: false

  # --------------------------------------------------------------------------
  # ignore_unknown_settings — 忽略未知设置
  # --------------------------------------------------------------------------
  # 默认: []
  #
  # 列出 Recursor 应忽略的未知配置项名称。当不同版本间配置文件
  # 共享时（如从一个高版本回到低版本），新参数可能导致启动失败。
  # 将新参数名添加到此列表可兼容旧版本。
  #
  # ignore_unknown_settings: []

  # --------------------------------------------------------------------------
  # export_etc_hosts — 导出 /etc/hosts
  # --------------------------------------------------------------------------
  # 默认: false
  # 将 /etc/hosts 中的条目作为权威 DNS 数据导出。
  #
  # 开启后 Recursor 对 /etc/hosts 中定义的域名直接返回对应 IP，
  # 不向上游权威发起查询。适合小型环境快速做本地 DNS 覆盖。
  #
  export_etc_hosts: false

  # --------------------------------------------------------------------------
  # etc_hosts_file — hosts 文件路径
  # --------------------------------------------------------------------------
  # 默认: /etc/hosts
  #
  # 当 export_etc_hosts 开启时，从此文件加载本地 DNS 覆盖条目。
  # 可指向自定义 hosts 文件以隔离系统级 hosts 和 DNS 级的 hosts。
  #
  # etc_hosts_file: '/etc/hosts'

  # --------------------------------------------------------------------------
  # event_trace_enabled — 事件跟踪
  # --------------------------------------------------------------------------
  # 默认: 0 (禁用)
  # 1=protobuf, 2=日志, 4=OpenTelemetry, 可加和 (如 6=日志+OTel)
  #
  # 启用后记录每个 DNS 查询的完整生命周期跟踪数据，用于:
  #   - protobuf (1): 发送给 dnsdist 等分析工具
  #   - 日志 (2): 写入 Recursor 日志
  #   - OpenTelemetry (4): 导出到 OTel 收集器（Jaeger, Grafana Tempo）
  #
  # 性能影响: 极大（每个查询都要记录完整解析过程），不宜在生产环境长期开启。
  #
  # event_trace_enabled: 0

  # --------------------------------------------------------------------------
  # forward_zones — 权威转发（RD=0，转发给权威 DNS）
  # --------------------------------------------------------------------------
  # 用于将内部域名的查询转发到内部权威 DNS。
  # 注意: 如果父域有 DNSSEC 签名而转发目标没有，会被判定为 Bogus。
  # 解决方案: 添加 NTA (Negative Trust Anchor)。
  #
  # 示例:
  # forward_zones:
  #   - zone: 'internal.example.com'
  #     forwarders:
  #       - '10.0.0.53'
  #       - '10.0.0.54:5300'
  #
  # forward_zones: []
  forward_zones:
    - zone: 'abcd.com'
      forwarders:
        - '10.20.1.8:53'
        # - '10.0.0.54:5300'

  # --------------------------------------------------------------------------
  # forward_zones_recurse — 递归转发（RD=1，转发给另一个递归 DNS）
  # --------------------------------------------------------------------------
  # 用于将查询转发给上游递归 DNS（如公司出口递归、ISP DNS）。
  # 不会遵循子域委托。
  #
  # forward_zones_recurse:
  #   - zone: '.'
  #     forwarders:
  #       - '8.8.8.8'
  #       - '8.8.4.4'
  #
  forward_zones_recurse: []

  # --------------------------------------------------------------------------
  # forward_zones_file — 从文件加载转发规则
  # --------------------------------------------------------------------------
  # 文件名必须以 .yml 结尾。
  # 文件内容为 Forward Zone 序列（与 forward_zones 同格式）。
  #
  # 将转发规则分离到独立文件，便于自动化工具生成或 CI/CD 管理。
  # 配合 include_dir 使用可自动扫描目录中所有转发文件。
  #
  # forward_zones_file: '/etc/powerdns/forward.yml'

  # --------------------------------------------------------------------------
  # auth_zones — 本地权威 Zone
  # --------------------------------------------------------------------------
  # 从 BIND 格式的区域文件提供权威 DNS 应答（但不设 AA 标志，不支持 DNSSEC）。
  # 适用于覆盖特定域名、本地测试等。
  #
  # auth_zones:
  #   - zone: 'local.example.com'
  #     file: '/etc/powerdns/zones/local.example.com.zone'
  #
  auth_zones: []


  ###############################################################################
  # RPZ (Response Policy Zones) DNS 防火墙功能，根据策略屏蔽/重定向恶意域名。           
  # 每个条目可来自本地文件或远程 AXFR。
  #
  # =========================================================================
  # RPZ (Response Policy Zones) — DNS 防火墙 / 响应策略区域
  # =========================================================================
  #
  # 背景:
  #   RPZ 允许 Recursor 根据域名、IP 地址等条件，对 DNS 查询采取自定义动作。
  #   本质上是一个 DNS 层面的防火墙，可以在递归解析器上直接拦截恶意域名、
  #   重定向可疑查询，或修改 DNS 响应。
  #
  #   RPZ 是 DNS 安全防护的第一道防线，在客户端设备接触恶意内容之前就阻断
  #   对恶意域名的访问。比基于 IP/URL 的防火墙更高效（DNS 查询量远小于流量）。
  #
  # 工作原理:
  #
  #   ┌──────────────┐   查询 malw.com    ┌──────────────┐
  #   │  客户端      │ ─────────────────→ │  Recursor     │
  #   │  10.0.0.100  │                    │               │
  #   └──────────────┘                    │  1. 查 RPZ ───┼──→ rpzs 列表
  #                                       │     ↓         │
  #                                       │  2. 命中规则  │
  #                                       │     ↓         │
  #                                       │  3. 返回动作  │
  #   ┌──────────────┐                    │               │
  #   │  客户端      │ ←───────────────── │  NXDOMAIN /   │
  #   │  10.0.0.100  │  阻断！域名不存在  │  Drop / 重定向│
  #   └──────────────┘                    └──────────────┘
  #
  # RPZ 数据来源:
  #   1) 本地文件 — 从 BIND 格式的 zone 文件加载（.zone/.txt 文件）
  #   2) 远程 AXFR — 从远程权威 DNS 服务器通过区域传输拉取（自动更新）
  #   3) 混合使用 — 同时配置多个本地和远程源
  #
  # ═══════════════════════════════════════════════════════════════════════
  # RPZ 条目结构 (每个条目)
  # ═══════════════════════════════════════════════════════════════════════
  #
  #   - name: <来源标识>
  #     addresses: [<IP列表>]              # 仅远程 AXFR 需要
  #     tsigName: '<TSIG密钥名>'           # 可选，AXFR TSIG 认证
  #     tsigAlgo: 'hmac-sha256'            # 可选，TSIG 算法
  #     tsigSecret: '<base64密钥>'         # 可选，TSIG 密钥
  #     defpol: <默认动作>                 # 可选，覆盖 zone 中的默认策略
  #     defcontent: '<自定义响应>'          # defpol=Custom 时使用
  #     policyName: '<策略名>'             # 可选，用于日志/指标区分
  #     refresh: <秒>                      # 可选，AXFR 刷新间隔（默认 60s）
  #     maxTTL: <秒>                       # 可选，记录最大 TTL
  #     ignoreDuplicates: true/false       # 可选，忽略重复记录
  #
  # ═══════════════════════════════════════════════════════════════════════
  # 默认策略 (defpol) — 命中 RPZ 规则后的动作
  # ═══════════════════════════════════════════════════════════════════════
  #
  #   Drop       — 直接丢弃查询，客户端会超时重试（最隐蔽）
  #   NXDOMAIN   — 返回"域名不存在"，客户端立即停止尝试 ★推荐
  #   NODATA     — 返回空响应（域名存在但无该类型记录）
  #   Truncate   — 返回 TC 标志，强制客户端走 TCP（消耗攻击者资源）
  #   NoAction   — 不拦截，仅记录日志（用于监控或白名单）
  #   Custom     — 使用 defcontent 自定义响应内容（如显示拦截页面）
  #
  # ═══════════════════════════════════════════════════════════════════════
  # 常用公开威胁情报 RPZ 源
  # ═══════════════════════════════════════════════════════════════════════
  #
  #   Spamhaus DBL:          rpz.spamhaus.org         (恶意软件/C&C)
  #   SURBL:                 rpz.surbl.org             (垃圾邮件)
  #   URLhaus:               rpz.urlhaus.abuse.ch      (恶意软件分发)
  #   ThreatFox:             rpz.threatfox.abuse.ch    (IOC 威胁情报)
  #   DGA 域名检测:            rpz.dga.xxxxx             (DGA 生成域名)
  #
  #   注意: 公开 RPZ 源可能有速率限制或需要许可证，生产使用前请确认条款。
  #
  # ═══════════════════════════════════════════════════════════════════════
  # 本地 RPZ 文件格式
  # ═══════════════════════════════════════════════════════════════════════
  #
  #   本地 RPZ 文件使用 BIND zone 格式:
  #
  #   $ORIGIN malware.local.
  #   @   SOA  ns1 admin 1 3600 900 604800 86400
  #       NS   localhost.
  #
  #   ; 拦截单个域名 — 返回 NXDOMAIN
  #   bad-domain.com          CNAME .
  #   *.bad-domain.com        CNAME .
  #
  #   ; 拦截并重定向到拦截页面
  #   phishing-site.com       CNAME walled-garden.internal.
  #   phishing-site.com       A 192.168.1.1
  #
  #   ; 白名单 (不拦截)
  #   allowed-safe.com        CNAME rpz-passthru.
  #
  #   ; 阻断 IP 的反向查询
  #   32.1.0.0.10.rpz-ip      CNAME .
  #
  # ═══════════════════════════════════════════════════════════════════════
  # 配置示例
  # ═══════════════════════════════════════════════════════════════════════
  #
  #   示例 1 — 仅本地文件:
  #     rpzs:
  #       - name: '/etc/powerdns/rpz/malware-block.zone'
  #         defpol: NXDOMAIN
  #       - name: '/etc/powerdns/rpz/internal-whitelist.zone'
  #         defpol: NoAction
  #
  #   示例 2 — 远程 AXFR + 自定义策略名:
  #     rpzs:
  #       - name: 'rpz.spamhaus.org'
  #         addresses: ['10.0.0.53']
  #         defpol: Drop
  #         policyName: 'spamhaus'
  #         refresh: 300
  #
  #   示例 3 — 多层 RPZ（按优先级顺序，先匹配先生效）:
  #     rpzs:
  #       # 第1层: 内部白名单 (优先级最高)
  #       - name: '/etc/powerdns/rpz/whitelist.zone'
  #         defpol: NoAction
  #         policyName: 'whitelist'
  #       # 第2层: 自定义封锁列表
  #       - name: '/etc/powerdns/rpz/custom-block.zone'
  #         defpol: NXDOMAIN
  #         policyName: 'custom-blocklist'
  #       # 第3层: 公开威胁情报
  #       - name: 'rpz.spamhaus.org'
  #         addresses: ['10.0.0.53']
  #         defpol: Drop
  #         policyName: 'spamhaus'
  # 运营建议:
  #   - 白名单 RPZ 放在最前面，防止误拦正常业务域名
  #   - 先用 NoAction/Log 模式运行一周，分析命中情况确认无误拦
  #   - 分层组织 RPZ: 白名单 → 自定义黑名单 → 公开威胁情报
  #   - 监控 RPZ 命中率指标，及时发现异常流量
  #   - 远程 AXFR 注意网络可达性（dont_query 不限制 RPZ 拉取地址）
  #   - 配合 rpz_changes 日志选项追踪 RPZ 规则更新

  rpzs:
    # ─── 白名单（优先级最高，匹配到的域名不拦截）───
    - name: '/etc/powerdns/rpz/whitelist.txt'
      defpol: NoAction
      policyName: 'whitelist'

    # ─── Multi ultimate — 广告/跟踪/恶意软件/弹窗 ───
    - name: '/etc/powerdns/rpz/hagezi-ultimate.txt'
      defpol: NXDOMAIN
      policyName: 'hagezi-ultimate'

    # ─── TIF — 威胁情报 (~1.6M 条目, ~400MB 内存) ───
    - name: '/etc/powerdns/rpz/hagezi-tif.txt'
      defpol: NXDOMAIN
      policyName: 'hagezi-tif'

    # ─── Fake — 虚假网店/诈骗检测 (~16K 条目) ───
    - name: '/etc/powerdns/rpz/hagezi-fake.txt'
      defpol: NXDOMAIN
      policyName: 'hagezi-fake'

    # ─── Pop-Up Ads — 弹窗广告拦截 (~56K 条目) ───
    - name: '/etc/powerdns/rpz/hagezi-popupads.txt'
      defpol: NXDOMAIN
      policyName: 'hagezi-popupads'

    # ─── Safesearch — 强制安全搜索 ───
    - name: '/etc/powerdns/rpz/hagezi-nosafesearch.txt'
      defpol: NXDOMAIN
      policyName: 'hagezi-nosafesearch'

    # ─── Abused TLDs — 高风险顶级域拦截 (~130 条) ───
    - name: '/etc/powerdns/rpz/hagezi-tlds.txt'
      defpol: NXDOMAIN
      policyName: 'hagezi-tlds'

    # ─── Badware Hoster — 恶意软件托管商 (~1.2K 条目) ───
    - name: '/etc/powerdns/rpz/hagezi-hoster.txt'
      defpol: NXDOMAIN
      policyName: 'hagezi-hoster'

    # ─── DoH/VPN/Proxy Bypass — 防止 DNS 绕过 (~3.4K 条目) ───
    - name: '/etc/powerdns/rpz/hagezi-doh.txt'
      defpol: NXDOMAIN
      policyName: 'hagezi-doh'

    # ─── Dynamic DNS — 动态 DNS 阻止/防 C2 (~1.5K 条目) ───
    - name: '/etc/powerdns/rpz/hagezi-dyndns.txt'
      defpol: NXDOMAIN
      policyName: 'hagezi-dyndns'

    # ─── URL Shortener — 短链接服务拦截 (~10K 条目) ───
    - name: '/etc/powerdns/rpz/hagezi-urlshortener.txt'
      defpol: NXDOMAIN
      policyName: 'hagezi-urlshortener'

    # ─── Anti Piracy — 反盗版 (~31K 条目) ───
    - name: '/etc/powerdns/rpz/hagezi-anti.txt'
      defpol: NXDOMAIN
      policyName: 'hagezi-anti'

    # ─── Gambling — 赌博网站拦截 (~280K 条目) ───
    - name: '/etc/powerdns/rpz/hagezi-gambling.txt'
      defpol: NXDOMAIN
      policyName: 'hagezi-gambling'

    # ─── Social Networks — 社交网络拦截 (~900 条目) ───
    - name: '/etc/powerdns/rpz/hagezi-social.txt'
      defpol: NXDOMAIN
      policyName: 'hagezi-social'

    # ─── NSFW — 成人内容拦截 ───
    - name: '/etc/powerdns/rpz/hagezi-nsfw.txt'
      defpol: NXDOMAIN
      policyName: 'hagezi-nsfw'