# ===========================================================================
# 缓存 — Packet Cache + Record Cache
# ===========================================================================
# 概述:
#   PowerDNS Recursor 有两层独立的缓存，工作在不同层级:
#
#   ┌─────────────────────────────────────────────────────────────┐
#   │ 客户端查询 → Recursor                                       │
#   │                                                             │
#   │ 1. 包缓存 (Packet Cache)     ← 第一层，最快                  │
#   │    - 缓存完整的 DNS 响应报文（二进制 blob）                   │
#   │    - 命中后直接返回，零 CPU 开销                             │
#   │    - 缺点: 查询稍有不同（如+EDNS vs -EDNS）就无法命中        │
#   │                                                             │
#   │ 2. 记录缓存 (Record Cache)   ← 第二层，更灵活               │
#   │    - 缓存单独的 DNS 记录集（如 A 记录、AAAA 记录）            │
#   │    - 不同查询类型可复用同一记录                              │
#   │    - 缺点: 需要将记录组装成响应报文（少量 CPU 开销）          │
#   └─────────────────────────────────────────────────────────────┘
#
# 缓存层级示例:
#   查询 1: dig A example.com
#     → 包缓存 MISS（第一次见此查询）
#     → 记录缓存 MISS → 向上游权威查询 → 写入记录缓存
#     → 组装响应 → 写入包缓存（完整响应报文）
#
#   查询 2: dig A example.com (完全相同)
#     → 包缓存 HIT → 直接返回（0 CPU 开销）★
#
#   查询 3: dig AAAA example.com (不同类型)
#     → 包缓存 MISS（查询类型不同，包缓存不匹配）
#     → 记录缓存 HIT（example.com 的 AAAA 记录之前和 A 一起获取）
#     → 组装响应（少量 CPU 开销）
#
# 内存规划:
#   packetcache: 每 100 万条目 ≈ 1 GB 内存
#   recordcache: 每 100 万条目 ≈ 1~2 GB 内存
#   总计: 500K+1M 条目 ≈ 1.5~2.5 GB（含索引开销）
#
#   在 8GB 服务器上建议:
#     packetcache: 500000~1000000
#     recordcache: 1000000~2000000
# ===========================================================================

packetcache:

  # =========================================================================
  # disable — 是否禁用包缓存
  # =========================================================================
  # 默认: false
  #
  # true:  完全关闭包缓存，每次查询都重新解析。适用场景:
  #   - Lua 脚本会动态修改 DNS 响应（包缓存会绕过 Lua 脚本）
  #   - 调试 DNS 解析行为时需要每一跳的完整过程
  #   - RPZ 规则频繁变更且需要立即对所有客户端生效
  #
  # false: 正常行为（推荐），包缓存作为第一道防线大幅降低 CPU 负载
  #
  disable: false

  # =========================================================================
  # max_entries — 最大包缓存条目数
  # =========================================================================
  # 默认: 500000
  #
  # 达到上限后采用 LRU（最近最少使用）策略淘汰旧条目。
  #
  # 估算方法:
  #   需要的条目数 ≈ 活跃域名数 × 查询类型数(通常3~5) × 安全系数(1.5)
  #   例如: 10万个活跃域名 × 4种查询类型 × 1.5 = 60万 ≈ 500000
  #
  # 调优:
  #   - 小型办公 (1000 客户端): 100000~250000
  #   - 中型企业 (10000 客户端): 500000~1000000
  #   - 大型企业/ISP: 1000000~5000000
  #
  # 内存: 500000 条目 × ~1KB/条目 ≈ 500MB
  #
  max_entries: 500000

  # =========================================================================
  # max_entry_size — 单包最大缓存大小（字节）
  # =========================================================================
  # 默认: 8192 (8KB)
  # 0 = 不限制
  #
  # 防止超大 DNS 响应（如包含数百条 TXT 记录的响应）挤占缓存空间。
  # 8KB 可以容纳大多数正常 DNS 响应（包含 DNSSEC 签名的响应通常 2~6KB）。
  #
  # 超过此值的响应不写入包缓存（但仍可写入记录缓存，如果记录大小合规）。
  #
  max_entry_size: 8192

  # =========================================================================
  # shards — 缓存分片数
  # =========================================================================
  # 默认: 1024
  #
  # 分片将缓存分为多个独立的哈希表，每个分片有自己的锁。
  # 线程数越多，需要的分片越多以减少锁竞争。
  #
  # 建议: 2 的幂（如 512、1024、2048），利用位运算加速哈希
  #   - 4 线程:  512 足够
  #   - 8 线程:  1024 推荐
  #   - 16+ 线程: 2048 推荐
  #
  shards: 1024

  # =========================================================================
  # ttl — 包缓存最大 TTL（秒）
  # =========================================================================
  # 默认: 86400 (24 小时)
  #
  # 无论权威服务器返回多长的 TTL，包缓存中最多保留此秒数。
  # 这是防止包缓存被极少查询的"冷数据"长期占据的保险机制。
  #
  # 注意: 这只是上限，实际缓存时间 = min(权威TTL, 此值)。
  #
  ttl: 86400

  # =========================================================================
  # negative_ttl — 否定应答缓存 TTL（秒）
  # =========================================================================
  # 默认: 60
  #
  # NXDOMAIN（域名不存在）和 NODATA（记录类型不存在）的缓存时间。
  #
  # 为什么需要单独设置:
  #   - 否定应答是"域名不存在"的结论，缓存它可阻止大量无效查询
  #   - 但缓存太久可能掩盖"域名刚刚被创建"的事实
  #   - 60 秒在性能和及时性之间平衡
  #
  # 如果权威返回的 SOA 中 minTTL 更小，则使用 minTTL。
  # 此值仅作为 NXDOMAIN/NODATA 的上限。
  #
  negative_ttl: 60

  # =========================================================================
  # servfail_ttl — 解析失败缓存 TTL（秒）
  # =========================================================================
  # 默认: 60
  #
  # ServFail 等解析失败结果的缓存时间。
  #
  # 为什么需要缓存失败:
  #   如果某权威服务器暂时不可达，客户端可能在 1 秒内重试数百次。
  #   短暂缓存 ServFail 可防止这种"重试风暴"压垮 Recursor 和上游。
  #
  # 60 秒是合理选择: 给上游足够时间恢复，也给客户端合理的等待时间。
  #
  servfail_ttl: 60

# ═══════════════════════════════════════════════════════════════════════════
# 记录缓存 (Record Cache)
# ═══════════════════════════════════════════════════════════════════════════
#
# 记录缓存比包缓存更灵活，因为它缓存的是"数据"而非"响应报文"。
# 不同查询类型（A、AAAA、MX 等）可以共享同一次上游查询获取的记录。
# ═══════════════════════════════════════════════════════════════════════════

recordcache:

  # =========================================================================
  # max_entries — 最大记录缓存条目数
  # =========================================================================
  # 默认: 1000000 (100 万)
  #
  # 记录缓存条目数应大于包缓存，因为:
  #   - 记录缓存存储独立记录（如 example.com A），而非完整报文
  #   - 同一个域名的 A、AAAA、MX、NS 等是不同的记录条目
  #   - 通常设为包缓存的 2~4 倍
  #
  # 内存: 1000000 条目 × 1~2KB/条目 ≈ 1~2GB
  #
  max_entries: 1000000

  # =========================================================================
  # max_entry_size — 单条记录缓存最大大小（字节）
  # =========================================================================
  # 默认: 8192 (8KB)
  #
  # 与 packetcache.max_entry_size 类似，但这里控制的是单条 DNS 记录。
  # 单条记录通常远小于完整报文（如 A 记录 ~16 字节），但仍需限制以
  # 防止异常大的 TXT/SPF/DKIM 记录占用不合理空间。
  #
  max_entry_size: 8192

  # =========================================================================
  # max_ttl — 记录缓存最大 TTL（秒）
  # =========================================================================
  # 默认: 86400 (24 小时)
  #
  # 与 packetcache.ttl 相同逻辑: 防止冷数据长期占据缓存。
  # 86400 = 24 小时，是性能与内存平衡的良好值。
  #
  max_ttl: 86400

  # =========================================================================
  # max_negative_ttl — 否定缓存最大 TTL（秒）
  # =========================================================================
  # 默认: 3600 (1 小时)
  #
  # NXDOMAIN/NODATA 在记录缓存层的最大保留时间。
  # 比包缓存的 60 秒长很多，因为记录缓存的否定数据可被更多查询类型复用。
  #
  max_negative_ttl: 3600

  # =========================================================================
  # max_cache_bogus_ttl — Bogus 缓存 TTL（秒）
  # =========================================================================
  # 默认: 3600 (1 小时)
  #
  # DNSSEC 验证失败（Bogus）的结果缓存时间。
  # 短时间缓存防止客户端反复触发对同一 Bogus 域名的验证。
  # 1 小时给域名管理员足够时间修复 DNSSEC 配置（如重新签名）。
  #
  max_cache_bogus_ttl: 3600

  # =========================================================================
  # shards — 记录缓存分片数
  # =========================================================================
  # 默认: 1024
  #
  # 与 packetcache.shards 相同原理。由于记录缓存通常更大（条目更多），
  # 在高并发场景可能需要更多分片（如 2048）。
  #
  shards: 1024

  # =========================================================================
  # limit_qtype_any — 禁止缓存 ANY 类型查询的应答
  # =========================================================================
  # 默认: true
  #
  # ANY 查询可能返回一个域名的所有记录类型，响应巨大且包含大量冗余数据。
  # 缓存这些响应对性能和内存都是浪费。
  #
  # 强烈建议保持 true。ANY 查询还常被用于 DNS 反射放大攻击。
  #
  limit_qtype_any: true

  # =========================================================================
  # max_rrset_size — 最大 RRSet 大小
  # =========================================================================
  # 默认: 256
  #
  # RRSet (Resource Record Set) 是同一域名、同一类型的一组记录。
  # 例如 example.com 的 8 条 A 记录就是一个 RRSet。
  #
  # 超过此值的 RRSet 返回 ServFail。防止过大 RRSets 导致内存/CPU 问题。
  # 256 足够容纳绝大多数正常配置（极少数站点会配置超过 256 条同类型记录）。
  #
  max_rrset_size: 256

  # =========================================================================
  # locked_ttl_perc — 记录缓存更新锁定（缓存投毒防护）
  # =========================================================================
  # 默认: 0（不锁定）
  #
  # 记录在原始 TTL 剩余此百分比内不接受更新。
  #
  # 防缓存投毒原理:
  #   攻击者可能试图用伪造的 DNS 响应覆盖缓存中的合法记录。
  #   锁定机制确保"新鲜的"记录（TTL 还很长）不能被随意替换。
  #
  # 值含义:
  #   - 0:  不锁定，任何时刻都可更新（默认，性能优先）
  #   - 50: TTL 过半后才接受更新（如 TTL=300s，150s 内不接受新数据）
  #   - 100: 只有完全过期的记录才能被替换（最安全，但可能服务过期数据）
  #
  # 对 DNSSEC 环境: locked_ttl_perc 意义有限（DNSSEC 已验证的答案
  # 已确保真实性），设为 0 即可。
  #
  locked_ttl_perc: 0

  # =========================================================================
  # refresh_on_ttl_perc — 记录缓存预刷新
  # =========================================================================
  # 默认: 0（不预刷新）
  #
  # 当记录剩余 TTL 百分比低于此值时，后台自动向权威服务器发起查询
  # 以刷新缓存。这使后续客户端查询始终命中新鲜缓存，无需等待。
  #
  # 工作原理:
  #   记录 TTL=100s, refresh_on_ttl_perc=10
  #     → 当剩余 TTL < 10s 时，后台异步刷新
  #     → 客户端查询时如果旧记录仍未过期，返回旧记录并同时等待刷新结果
  #
  # 预刷新 vs 同步刷新:
  #   - 预刷新 (refresh_on_ttl_perc > 0): 后台提前刷，客户端不等待
  #   - 过期刷新 (serve_stale): 记录过期后才刷，客户端可能等更久
  #
  # 高流量环境推荐: 10~25，减少客户端感知的延迟抖动。
  #
  refresh_on_ttl_perc: 10

  # =========================================================================
  # serve_stale_extensions — 过期记录继续服务（韧性模式）
  # =========================================================================
  # 默认: 0（不启用）
  #
  # 当缓存记录已过期但 Recursor 无法从上游权威刷新时，
  # 延长服务过期的缓存记录。
  #
  # 值含义:
  #   每次延长服务时间为 30 秒，此值表示最多延长多少次。
  #   例如 120 → 最多延长 120 × 30s = 3600s = 1 小时
  #
  # 适用场景:
  #   - 提高权威服务器故障时的 DNS 可用性（韧性模式）
  #   - 权威服务器计划内维护期间的优雅降级
  #   - 网络分区场景下的局部可用性
  #
  # 风险:
  #   - 返回可能已过期的 DNS 数据（客户端可能连到已废弃的 IP）
  #   - 延长服务期间 DNSSEC 签名可能已过期（Bogus 风险）
  #
  # 建议:
  #   - 0: 默认，不服务过期数据（一致性强）
  #   - 60~180: 适度韧性（3~9 分钟过期数据服务）
  #   - 仅在已知权威服务器有可靠性问题时开启
  #
  serve_stale_extensions: 0

