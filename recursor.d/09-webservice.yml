# ===========================================================================
# Web 服务 — REST API + 内置管理界面
# ===========================================================================
# 概述:
#   Recursor 内置了一个轻量级 Web 服务器，提供:
#   1. REST API — 用于编程化管理（查询统计、修改配置、管理 RPZ 等）
#   2. 内置 Web 界面 — 浏览器访问，通过 HTTP Basic Auth 登录
#
# 双认证体系:
#   ┌──────────────┬──────────────────────────┬─────────────────────┐
#   │ 认证方式      │ 传递方式                   │ 用途                │
#   ├──────────────┼──────────────────────────┼─────────────────────┤
#   │ api_key      │ HTTP 头 X-API-Key        │ REST API 编程调用   │
#   │ password     │ HTTP Basic Auth          │ 浏览器 Web 界面登录  │
#   └──────────────┴──────────────────────────┴─────────────────────┘
#
# 安全最佳实践:
#   - 生产环境: address 绑 127.0.0.1，通过 Nginx/Caddy 反向代理暴露
#   - TLS 终止: 反向代理处理 HTTPS，Recursor 本身只支持 HTTP
#   - 网络隔离: allow_from 严格限制可访问 Web API 的 IP
#   - 凭据管理: 使用 hash_plaintext_credentials=true 防内存泄露
# ===========================================================================

webservice:

  # =========================================================================
  # webserver — 是否启动 Web 服务器
  # =========================================================================
  # 默认: true (≥5.0 起默认启用)
  #
  # 即使不需要 Web 管理界面，也建议保持 true，因为:
  #   - REST API 是获取运行指标（Prometheus/Grafana 集成）的基础
  #   - rec_control 也通过内部 API 通信
  #   - 无 Web API 时无法远程监控 Recursor 状态
  #
  webserver: true

  # =========================================================================
  # address — Web 服务器监听地址
  # =========================================================================
  # 默认: 127.0.0.1 (仅本机)
  #
  # 安全第一: 仅绑定 127.0.0.1，防止外部直接访问。
  #
  # 如需远程访问:
  #   方式一 (推荐): 保持 127.0.0.1，通过反向代理暴露:
  #     Nginx:  proxy_pass http://127.0.0.1:8082;
  #     Caddy:  reverse_proxy 127.0.0.1:8082
  #     优点: TLS 终止、访问日志、限流、IP 白名单由代理处理
  #
  #   方式二: 绑定管理网段 IP（仅当无代理可用时）:
  #     address: '10.0.0.1'  # 仅管理网段可达
  #     配合 allow_from 进一步限制
  #
  # 警告: 切勿绑定 0.0.0.0！等同于将管理 API 暴露到公网。
  #
  address: '127.0.0.1'

  # =========================================================================
  # port — Web 服务器端口
  # =========================================================================
  # 默认: 8082
  #
  # 避免与常见服务端口冲突:
  #   - 8080: 常见 HTTP 开发端口（可能与 Jenkins/Nexus 等冲突）
  #   - 8082: PowerDNS 家族常用端口（Recursor 和 dnsdist 都使用）
  #
  port: 8082

  # =========================================================================
  # allow_from — Web API 访问控制 (IP ACL)
  # =========================================================================
  # 语法同 incoming.allow_from: CIDR 子网，支持 ! 排除
  #
  # 与 incoming.allow_from 的区别:
  #   - incoming.allow_from: 控制"谁可以用 DNS 递归服务"
  #   - webservice.allow_from: 控制"谁可以访问管理 API"
  #   两者独立设置，通常 allow_from 比 webservice.allow_from 更宽
  #
  allow_from:
    - '127.0.0.1'
    - '::1'

  # ═══════════════════════════════════════════════════════════════════
  # api_key — REST API 密钥（生产环境必须替换！）
  # ═══════════════════════════════════════════════════════════════════
  #
  # 用于 REST API 编程调用认证，通过 HTTP 头传递:
  #   curl -H 'X-API-Key: YOUR_KEY' http://127.0.0.1:8082/api/v1/servers/localhost/statistics
  #
  # 支持的格式:
  #   1) 明文（直接填写随机字符串）:
  #       生成: openssl rand -hex 32
  #       用法: api_key: 'a1b2c3...'
  #
  #   2) scrypt 哈希值（更安全，内存中不保留明文）:
  #       生成: rec_control hash-password
  #       输入明文密钥 → 输出 $scrypt$ln=10,p=1,r=8$salt$hash
  #       用法: api_key: '$scrypt$...'
  #
  #   hash_plaintext_credentials=true 时，明文密钥启动后自动转为
  #   哈希存储，减少内存中明文凭据存在的时间窗口。
  #
  # 常用 REST API 端点:
  #   GET  /api/v1/servers/localhost/statistics     — 所有统计指标
  #   GET  /api/v1/servers/localhost/config         — 当前运行时配置
  #   PUT  /api/v1/servers/localhost/config         — 修改运行时配置
  #   GET  /api/v1/servers/localhost/zones           — 列出 auth zones
  #   POST /api/v1/servers/localhost/zones           — 创建 auth zone
  #   GET  /api/v1/servers/localhost/cache           — 查询缓存内容
  #   PUT  /api/v1/servers/localhost/cache/flush     — 清空缓存
  #
  # 下面的是示例密钥，生产环境务必替换！
  api_key: '$scrypt$ln=10,p=1,r=8$tRTvIBBfvN0vOiVXWbw7Ug==$0x24W1A9P+1RQ09Aq3MFMOXzSjx4Zc1rS6zLEQl7Ukw='

  # ═══════════════════════════════════════════════════════════════════
  # password — Web 管理界面密码（生产环境必须替换！）
  # ═══════════════════════════════════════════════════════════════════
  #
  # HTTP Basic Auth 密码，用于浏览器访问 Web 管理界面。
  #
  # 用户名固定为 'admin'（不可更改），密码在此设置。
  # 浏览器访问 http://127.0.0.1:8082 时会弹出 Basic Auth 登录框。
  #
  # 生成方式:
  #   openssl rand -base64 24 | tr -d '+/=' | head -c 24 && echo
  #   或: cat /dev/urandom | tr -dc 'A-Za-z0-9' | head -c 24 && echo
  #
  # 下面的是示例密码，生产环境务必替换！
  password: 'g14Ki2qZlMpMJZvvOqKpCpue'

  # =========================================================================
  # api_dir — API 数据和 zone 存储目录
  # =========================================================================
  # 默认: 空（使用编译时默认路径）
  #
  # 存储通过 REST API 创建的数据（如 auth_zones）。
  # 如果留空，数据在 Recursor 重启后会丢失。
  # 指定持久化目录以保留 API 创建的数据。
  #
  # api_dir: '/var/lib/pdns-recursor/api'

  # =========================================================================
  # loglevel — Web 服务器日志级别
  # =========================================================================
  # 默认: 'normal'
  # 可选: 'none' | 'normal' | 'detailed'
  #
  # none:     仅记录 Web 服务器错误（如端口绑定失败）
  # normal:   记录每个 HTTP 请求的方法、路径、状态码和响应时间
  # detailed: normal 基础上增加请求体和响应体（可能包含凭据等敏感信息！）
  #
  # 绝大多数场景使用 normal 即可。
  #
  loglevel: 'normal'

  # =========================================================================
  # hash_plaintext_credentials — 明文凭据自动哈希
  # =========================================================================
  # 默认: true
  #
  # 安全增强功能:
  #   启动时检测 api_key/password 是否为明文（非 $scrypt$ 等哈希前缀），
  #   如果是明文则自动计算 scrypt 哈希，以哈希值替换内存中的明文。
  #
  # 好处:
  #   - 减少明文凭据在内存中存在的时间窗口
  #   - 即使发生 core dump 或内存泄露，凭据也不易被提取
  #
  # 注意:
  #   - 转换后的哈希值会打印在日志中（可保存用于配置文件）
  #   - 下次启动时如果直接使用哈希值，则跳过转换（更快）
  #
  hash_plaintext_credentials: true

  # =========================================================================
  # max_request_size — 最大 API 请求大小 (MB)
  # =========================================================================
  # 默认: 2 (MB)
  #
  # 限制单个 HTTP 请求体大小，防止:
  #   - 上传超大 zone 文件导致内存耗尽
  #   - 恶意大请求占用 Web 线程
  #
  # 2MB 足够容纳绝大多数合法的 API 请求（即使上传 zone 文件）。
  #
  max_request_size: 2


###############################################################################
# Carbon / Graphite 监控（可选）
###############################################################################

# 将 Recursor 性能指标定期发送到 Carbon/Graphite 服务。
# 适合已有 Graphite 基础设施的环境。
#
# carbon:
#   server: '10.0.0.100:2004'    # Carbon 服务地址
#   interval: 30                  # 发送间隔（秒）
#   ns: 'pdns'                    # 指标命名空间
#   ourname: ''                   # 覆盖本机名称
#   instance: 'recursor'          # 实例标识


###############################################################################
# SNMP 监控（可选）
###############################################################################

# 通过 SNMP 协议暴露 Recursor 运行状态。
# 适合使用传统网络管理系统（如 Zabbix、Nagios）的环境。
#
# snmp:
#   agent: false                  # 是否启用 SNMP agent
#   daemon_socket: ''             # SNMP daemon socket 路径
