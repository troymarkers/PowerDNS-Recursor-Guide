# ===========================================================================
# NOD/UDR — 新域名与独特响应检测
# ===========================================================================
# 概述:
#   NOD (Newly Observed Domain) 和 UDR (Unique Domain Response) 是 PowerDNS
#   Recursor 内置的威胁检测引擎，通过追踪"从未见过的域名"和"异常的 DNS 响应"
#   来识别潜在的恶意活动。
#
# 为什么重要:
#   - 恶意软件常使用 DGA (域名生成算法) 产生大量随机域名作为 C&C 通信通道，
#     这些域名在被查询之前可能从未在互联网上出现过。
#   - 钓鱼域名通常在攻击活动开始前几天才注册，对大多数网络来说是"新域名"。
#   - 数据泄露通道可能使用罕见 DNS 响应模式来绕过传统检测。
#
# 工作原理:
#   ┌──────────┐ 查询 never-seen-before.evil.com    ┌──────────┐
#   │ 客户端    │ ─────────────────────────────────→ │ Recursor │
#   └──────────┘                                     │          │
#                                                    │ 1. 递归解析
#                                                    │ 2. 查布隆过滤器
#                                                    │ 3. 未命中 → NOD!
#                                                    │ 4. 记录日志/上报
#                                                    └──────────┘
#
# 布隆过滤器 (Bloom Filter):
#   一种空间高效的概率数据结构，用于判断"某个域名是否曾被查询过"。
#   特性:
#     - 如果返回"见过" → 域名 100% 曾出现过（无误报否定）
#     - 如果返回"没见过" → 域名仅有极低概率曾出现过（可控误报率）
#     - 64MB 可容纳约 5000 万条域名，误报率 < 0.1%
#   与哈希表对比: 同样 5000 万条记录，哈希表需要 ~2GB，布隆过滤器仅需 64MB。
#
# 部署建议:
#   - 安全敏感环境（金融/政府）: 强烈建议开启 NOD tracking
#   - 一般企业: 可开启 tracking 但关闭 log，通过 API 查询统计
#   - 纯内网 DNS (无互联网出口): 意义不大，保持默认关闭
#
# 性能影响:
#   - CPU: 每次查询增加一次布隆过滤器查找（~微秒级）
#   - 内存: db_size 固定占用（64MB 默认）
#   - 磁盘: 如启用快照，每分钟写一次（约 64MB/次）
# ===========================================================================

nod:

  # =========================================================================
  # tracking — 是否启用新域名检测
  # =========================================================================
  # 默认: false
  #
  # 开启后，Recursor 对每个域名查询执行布隆过滤器检查。
  # 如果域名从未被查询过（首次出现），则标记为 NOD 事件。
  #
  # 适用场景:
  #   - 安全运营中心 (SOC) 的威胁狩猎 (Threat Hunting)
  #   - 检测 DGA 恶意软件（如 Locky、Necurs 等僵尸网络）
  #   - 识别网络中的新型钓鱼攻击
  #
  # 不建议开启的场景:
  #   - 纯转发模式（所有查询都转发给上游递归，上游会先看到新域名）
  #   - 测试/开发环境（大量临时域名会产生噪声）
  #   - 内存极度受限的嵌入式设备
  #
  tracking: false

  # =========================================================================
  # db_size — 布隆过滤器数据库大小（字节）
  # =========================================================================
  # 默认: 67108864 (64 MB)
  #
  # 决定布隆过滤器的容量和误报率。值越大 → 容量越大 → 误报率越低。
  #
  # 容量估算 (误报率 ~0.1%):
  #   - 1 MB   ≈ 80 万条域名（小型办公网络数月量级）
  #   - 8 MB   ≈ 600 万条域名（中型企业数月量级）
  #   - 64 MB  ≈ 5000 万条域名（大型企业/ISP 量级）★默认
  #   - 256 MB ≈ 2 亿条域名（运营商级别）
  #
  # 内存并非唯一约束:
  #   布隆过滤器需要连续内存块。在 32 位系统上建议 ≤64MB。
  #   64 位系统上可以安全使用更大的值（如 128MB~256MB）。
  #
  # 重要: 修改此值后，先前追踪的域名数据将丢失（需要重新积累）。
  #
  db_size: 67108864

  # =========================================================================
  # history_dir — NOD 历史持久化目录
  # =========================================================================
  # 默认: 空（不持久化）
  #
  # 定期将布隆过滤器状态保存到磁盘快照。Recursor 重启后自动恢复，
  # 避免丢失已积累的域名追踪数据。
  #
  # 持久化策略:
  #   - 每分钟自动写一次快照（如果自上次写入后有新域名被记录）
  #   - 快照文件名为 nod-state-<timestamp>.bloom
  #   - 恢复时加载最新的快照文件
  #
  # 磁盘开销:
  #   - 每快照 = db_size 字节（默认 64MB）
  #   - 建议保留最近 2~3 个快照，旧快照手动清理
  #
  # 推荐路径:
  #   - Debian/Ubuntu: /var/lib/pdns-recursor/nod
  #   - RHEL/Rocky:    /var/lib/pdns-recursor/nod
  #
  # 注意: 目录必须存在且 Recursor 运行用户有写权限。
  #
  # history_dir: '/var/lib/pdns-recursor/nod'

  # =========================================================================
  # db_snapshot_interval — 快照间隔（秒）
  # =========================================================================
  # 默认: 600 (10 分钟)
  # 0 = 禁用自动快照（仅在关闭时保存一次，或不保存）
  #
  # 权衡:
  #   - 间隔短 (如 60s): 重启后丢失数据少，但磁盘 I/O 频繁
  #   - 间隔长 (如 3600s): I/O 少，但最多丢失 1 小时内的新域名数据
  #   - 0: 仅在 Recursor 正常退出时保存（异常崩溃则全部丢失）
  #
  db_snapshot_interval: 600

  # =========================================================================
  # log — 是否记录新域名日志
  # =========================================================================
  # 默认: true
  #
  # true:  首次发现某域名时，在日志中记录一条 INFO 级别消息。
  #        "Newly observed domain: example.com (A)"
  # false: 仅内部追踪，不输出日志。可通过 REST API 查询统计:
  #        curl -H 'X-API-Key: KEY' http://127.0.0.1:8082/api/v1/servers/localhost/statistics | jq '.[] | select(.name | startswith("nod-"))'
  #
  # 选择 false 的典型场景:
  #   - 高 QPS 环境，日志量可能过大（每天数十万新域名）
  #   - 将 NOD 事件通过 protobuf 发送到外部 SIEM 分析（不走日志）
  #   - 仅需要统计数据（已追踪多少新域名），不需要逐条域名信息
  #
  log: true

  # =========================================================================
  # ignore_list — NOD 忽略列表
  # =========================================================================
  # 默认: []（不忽略任何域名）
  #
  # 匹配后缀的域名及其子域永不触发 NOD 检测。
  # 用途:
  #   - 内部测试域名（*.test.example.com）频繁创建/销毁，会导致大量误报
  #   - 动态 DNS 域名（*.duckdns.org）每次 IP 变化可视为"新域名"
  #   - 已知的 CDN/云服务临时域名
  #
  # 格式: 域名后缀列表
  #   - 'test.example.com' → 忽略 *.test.example.com 和 test.example.com
  #   - 注意: 仅匹配后缀，不匹配中间部分
  #
  # 示例:
  #   ignore_list:
  #     - 'test.mycompany.com'
  #     - 'staging.example.net'
  #
  # ignore_list: []

  # =========================================================================
  # lookup — 威胁情报上报后缀
  # =========================================================================
  # 默认: '' (不上报)
  #
  # 当检测到新域名时，Recursor 会额外查询 <新域名>.<lookup后缀> 的 TXT 记录。
  # 这是一种轻量级的威胁情报共享机制：通过 DNS 查询将新域名信息传递给
  # 威胁情报平台，无需专门的 HTTP API。
  #
  # 工作原理:
  #   检测到 new-malware.com 首次出现
  #     → 查询 new-malware.com.nod.powerdns.com TXT
  #     → 威胁情报平台收到查询，分析该域名
  #     → 返回 TXT 记录:"known-malware" 或 NXDOMAIN
  #
  # 隐私注意: 此机制会将你网络中新出现的域名泄露给 lookup 后缀的运营方。
  #   仅在你信任该威胁情报平台且符合隐私政策时使用。
  #
  # lookup: ''

  # =========================================================================
  # pb_tag — Protobuf 事件标签
  # =========================================================================
  # 默认: 'pdns-nod'
  #
  # 当启用 protobuf 事件流（recursor.event_trace_enabled 含 1）时，
  # NOD 事件的 protobuf 消息使用此标签标识。
  # 配合 dnsdist 或自定义分析工具过滤 NOD 事件。
  #
  # pb_tag: 'pdns-nod'

  # ═══════════════════════════════════════════════════════════════════════════
  # UDR — Unique Domain Response (独特响应追踪)
  # ═══════════════════════════════════════════════════════════════════════════
  #
  # UDR 与 NOD 互补: NOD 关注"域名是否首次出现"，UDR 关注"响应内容是否罕见"。
  #
  # 典型攻击场景:
  #   - C&C 服务器返回极不常见的 IP 地址（如最近刚分配的 AWS IP 段）
  #   - DNS 隧道工具返回特殊构造的 TXT/CNAME 记录用于数据泄露
  #   - Fast-flux 僵尸网络快速变更 IP，每次返回不同的罕见 IP 组合
  #
  # UDR 对每个 DNS 响应的"指纹"（域名 + 记录类型 + 响应内容）做布隆过滤，
  # 如果指纹从未出现过则标记为 UDR 事件。
  # ═══════════════════════════════════════════════════════════════════════════

  # --------------------------------------------------------------------------
  # unique_response_tracking — 是否启用独特响应追踪
  # --------------------------------------------------------------------------
  # 默认: false
  #
  # 启用后，Recursor 对每个响应的内容指纹做布隆过滤器检查。
  # 内存占用 = unique_response_db_size，与 NOD 的 db_size 独立。
  #
  # 适合与 NOD 同时开启: NOD 捕获新域名，UDR 捕获旧域名的新行为。
  #
  unique_response_tracking: false

  # --------------------------------------------------------------------------
  # unique_response_db_size — UDR 布隆过滤器大小
  # --------------------------------------------------------------------------
  # 默认: 67108864 (64 MB)
  #
  # 与 NOD 的 db_size 独立分配。UDR 追踪"响应指纹"而不仅是域名，
  # 因此指纹空间远大于域名空间，建议至少设为与 db_size 相同。
  #
  unique_response_db_size: 67108864

  # --------------------------------------------------------------------------
  # unique_response_history_dir — UDR 持久化目录
  # --------------------------------------------------------------------------
  # 持久化 UDR 布隆过滤器状态，重启后恢复。
  #
  # unique_response_history_dir: '/var/lib/pdns-recursor/udr'

  # --------------------------------------------------------------------------
  # unique_response_log — 是否记录独特响应日志
  # --------------------------------------------------------------------------
  # 默认: true
  # true: 检测到独特 DNS 响应时输出日志。
  #
  unique_response_log: true

  # --------------------------------------------------------------------------
  # unique_response_ignore_list — UDR 忽略列表
  # --------------------------------------------------------------------------
  # 匹配后缀的域名不触发 UDR 检测。
  # 例如负载均衡器每次返回不同 IP 的业务域名，不应被误报为"独特响应"。
  #
  # unique_response_ignore_list: []

  # --------------------------------------------------------------------------
  # unique_response_pb_tag — UDR Protobuf 标签
  # --------------------------------------------------------------------------
  # 默认: 'pdns-udr'
  # 如果启用 protobuf 事件流，UDR 事件使用此标签标识。
  #
  # unique_response_pb_tag: 'pdns-udr'
